async function loadSuggestions() {
  return SUGGESTIONS;
}

async function renderBgCards() {
  const data = await loadSuggestions();
  const colCount = 5;
  const cols = Array.from({ length: colCount }, () => []);
  data.forEach((suggestion, index) => cols[index % colCount].push(suggestion));
  document.getElementById('bg-cards').innerHTML = cols.map(col => {
    const html = col.map(item => `
      <div class="bg-card" onclick="fillSug(this.dataset.text)" data-text="${item.text.replace(/"/g, '&quot;')}">
        <div class="bg-cat"><span>${item.icon}</span>${item.cat}</div>
        <div class="bg-text">${esc(item.text)}</div>
      </div>`).join('');
    const half = html.repeat(5);
    return `<div class="bg-col">${half}${half}</div>`;
  }).join('');
}

document.getElementById('task-input').addEventListener('keydown', event => {
  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    sendTask();
  }
});

document.getElementById('thinking-toggle').addEventListener('click', event => {
  event.stopPropagation();
  toggleThinkingDrawer();
});

document.getElementById('thinking-pills').addEventListener('click', event => {
  const btn = event.target.closest('.tp');
  if (!btn) return;
  applyThinkingLevel(btn.dataset.level);
  setThinkingDrawerOpen(false);
});

document.getElementById('mode-pills').addEventListener('click', event => {
  const btn = event.target.closest('.tp');
  if (!btn) return;
  applyTaskMode(btn.dataset.mode);
});

document.getElementById('new-chat-btn').addEventListener('click', () => {

});

document.getElementById('history-list').addEventListener('click', event => {
  const button = event.target.closest('.history-item');
  if (!button) return;
  if (button.dataset.conversationId === activeConversationId) return;
  if (running) return;
  setActiveConversation(button.dataset.conversationId);
});

});

document.getElementById('jump-bottom-btn').addEventListener('click', () => {

});

document.addEventListener('click', event => {
  if (!event.target.closest('#thinking-control')) {
    setThinkingDrawerOpen(false);
  }
});

document.getElementById('file-input').addEventListener('change', event => {
  for (const file of event.target.files) pendingFiles.push(file);
  event.target.value = '';
  renderFileTags();
});

function renderFileTags() {
  const container = document.getElementById('file-tags');
  container.innerHTML = pendingFiles.map((file, index) =>
    `<span class="file-tag">${esc(file.name)}<span class="remove" onclick="removeFile(${index})">×</span></span>`
  ).join('');
}

function removeFile(index) {
  pendingFiles.splice(index, 1);
  renderFileTags();
}

function clearFiles() {
  pendingFiles = [];
  renderFileTags();
}

function toggleMonitor() {
  const panel = document.getElementById('monitor-panel');
  const btn = document.getElementById('monitor-toggle');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}

async function loadVerboseState() {
  try {
    const res = await fetch(apiUrl('/api/verbose'));
    if (!res.ok) return;
    const payload = await readResponsePayload(res);
    const data = payload.data;
    verboseOn = Boolean(data.verbose);
  } catch {
    verboseOn = false;
  }

  const btn = document.getElementById('verbose-toggle');
  btn.textContent = `Verbose: ${verboseOn ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', verboseOn);
}

async function toggleVerbose() {
  verboseOn = !verboseOn;
  const btn = document.getElementById('verbose-toggle');
  btn.textContent = `Verbose: ${verboseOn ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', verboseOn);
  try {
    await fetch(apiUrl('/api/verbose'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: verboseOn }),
    });
    if (activeTaskId) renderLatestMonitoringFromCache(activeTaskId);
  } catch {
    // Ignore transport errors; local UI state still updates.
  }
}

async function restoreActiveTask() {
  const conversation = getConversation();
  if (!conversation || !conversation.lastTaskId) {
    setSelectedTask('');
    clearReplyMode();
    renderTaskPanelsFromCache('');
    setDot('idle');
    return;
  }

  setActiveTask(conversation.lastTaskId);
  renderTaskPanelsFromCache(activeTaskId);

  try {
    const snapshot = await fetchTask(activeTaskId);
    if (!snapshot) {
      const activeConversation = getConversation();
      if (activeConversation) {
        touchConversation(activeConversation, { lastTaskId: '' });
        saveConversations();
        renderConversationList();
      }
      setSelectedTask('');
      renderTaskPanelsFromCache('');
      setDot('idle');
      return;
    }

    const currentSeq = getLastSeq(activeTaskId);
    const serverSeq = Number(snapshot.last_seq || 0);
    const liveTask = ['queued', 'running', 'waiting_for_user'].includes(snapshot.status);
    const waitingForReply = snapshot.status === 'waiting_for_user';

    if (waitingForReply && snapshot.pending_question) {
      setReplyMode(activeTaskId, snapshot.pending_question);
      setRunning(false);
    } else {
      clearReplyMode(activeTaskId);
      setRunning(['queued', 'running'].includes(snapshot.status));
    }

    if (serverSeq > currentSeq || liveTask) {
      openEventSource(activeTaskId, currentSeq);
    } else {
      terminalEventSeen = taskIsTerminal(snapshot.status);
      setDot('idle');
    }
  } catch {
    setDot('err');
    if (!conversation.entries.length) {
      const errorEntry = addOrUpdateConversationEntry({
        id: makeId('error'),
        type: 'error',
        content: '无法恢复上一次任务状态，请确认服务端是否正在运行。',
        createdAt: nowIso(),
      });
      upsertRenderedConversationEntry(errorEntry);
      scrollLogToBottom(false, true);
    }
  }
}

function taskIsTerminal(status) {
  return ['succeeded', 'failed', 'cancelled'].includes(status);
}

async function initApp() {
  ensureActiveConversation();
  applyTaskMode(taskMode);
  applyThinkingLevel(thinkingLevel);
  setThinkingDrawerOpen(false);
  document.getElementById('task-input').placeholder = DEFAULT_TASK_PLACEHOLDER;
  setDot('idle');
  resetMonitoringPanel();
  renderConversationList();
  renderActiveConversation();
  refreshTaskStateUi();
  await loadVerboseState();
  await restoreActiveTask();
  renderBgCards();
}

initApp();
