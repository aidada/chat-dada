<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chat dada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:   #FEF6ED;
    --warm0:   #FFF0E2;
    --warm1:   #FDDCC4;
    --peach:   #F6A97A;
    --rose:    #EE8B7B;
    --blush:   #F2BDB5;
    --honey:   #F0C080;
    --text:    #6B4033;
    --mid:     #A0705A;
    --dim:     #D4B4A4;
    --surface: #FFFAF5;
    --border:  #F0D8CA;
    --shadow:  rgba(200,120,80,0.10);
    --shell-width: 1240px;
    --page-gutter: 24px;
    --top-bar-height: 124px;
    --bottom-stage-space: 140px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:var(--cream); color:var(--text); font-family:'Nunito',sans-serif; overflow:hidden; }

  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(246,169,122,.13) 0%,transparent 70%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(238,139,123,.10) 0%,transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(253,220,196,.18) 0%,transparent 80%);
  }
  body::after{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.45;
    background-image:radial-gradient(circle,rgba(246,169,122,.2) 1px,transparent 1px);
    background-size:28px 28px;
  }

  /* ── Header ── */
  header{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:40;
    width:min(var(--shell-width), calc(100vw - (var(--page-gutter) * 2)));
    padding:18px 24px;
    display:grid;
    grid-template-columns:280px minmax(0, 1fr) auto;
    gap:24px;
    align-items:center;
    background:rgba(255,250,245,.86);
    border:1.5px solid rgba(240,216,202,.9);
    border-radius:30px;
    box-shadow:0 18px 38px rgba(200,120,80,.12);
    backdrop-filter:blur(16px);
  }
  .logo{ display:flex; align-items:center; gap:10px; }
  .logo-icon{
    width:36px; height:36px; border-radius:12px;
    background:linear-gradient(135deg,var(--peach),var(--rose));
    display:grid; place-items:center;
    font-family:'Pacifico',cursive; font-size:15px; color:#fff;
    box-shadow:0 4px 14px rgba(238,139,123,.35);
  }
  .logo-name{ font-family:'Pacifico',cursive; font-size:22px; color:var(--rose); text-shadow:0 2px 8px rgba(238,139,123,.2); }
  .ws-badge{
    justify-self:end;
    display:flex;
    align-items:center;
    gap:10px;
    min-width:max-content;
    background:rgba(255,255,255,.72);
    border:1.5px solid var(--border);
    border-radius:999px;
    padding:6px 8px 6px 14px;
    font-size:12px;
    font-weight:700;
    color:var(--mid);
    box-shadow:0 8px 20px rgba(200,120,80,.08);
  }
  .ws-dot{ width:7px; height:7px; border-radius:50%; background:var(--dim); transition:all .4s; }
  .ws-dot.on { background:#7EC98F; box-shadow:0 0 0 3px rgba(126,201,143,.25); animation:dpulse 2s ease-in-out infinite; }
  .ws-dot.err{ background:#E88080; box-shadow:0 0 0 3px rgba(220,80,80,.2); }
  @keyframes dpulse{ 0%,100%{box-shadow:0 0 0 3px rgba(126,201,143,.25);} 50%{box-shadow:0 0 0 6px rgba(126,201,143,.08);} }

  /* ── Main ── */
  .app-shell{
    position:relative; z-index:5;
    width:min(var(--shell-width), calc(100vw - (var(--page-gutter) * 2)));
    height:100vh;
    margin:0 auto;
    padding:calc(var(--top-bar-height) + 20px) 0 var(--bottom-stage-space);
    display:grid;
    grid-template-columns:280px minmax(0, 1fr);
    gap:28px;
    align-items:stretch;
    overflow:hidden;
  }
  main{
    min-width:0;
    min-height:0;
    height:100%;
    display:flex;
    flex-direction:column;
  }
  @keyframes fadeup{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%    { transform:translateX(-6px); }
    40%    { transform:translateX(6px); }
    60%    { transform:translateX(-4px); }
    80%    { transform:translateX(4px); }
  }

  /* ── 欢迎 ── */
  .welcome{
    min-width:0;
    text-align:center;
    animation:fadeup .7s ease both;
  }
  .welcome h1{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:34px;
    line-height:1.08;
    color:var(--rose);
    margin-bottom:6px;
  }
  .welcome p{
    font-size:14px;
    color:var(--mid);
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chat-layout{
    position:relative;
    flex:1;
    height:100%;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  /* ── History ── */
  .history-panel{
    position:relative;
    top:0;
    background:rgba(255,250,245,.9);
    border:1.5px solid var(--border);
    border-radius:26px;
    box-shadow:0 10px 32px var(--shadow);
    backdrop-filter:blur(10px);
    overflow:hidden;
    animation:fadeup .7s ease both;
    display:flex;
    flex-direction:column;
    min-height:0;
    height:100%;
  }
  .history-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    padding:20px 20px 16px;
    border-bottom:1.5px solid rgba(240,216,202,.75);
    background:linear-gradient(180deg,rgba(255,247,240,.96),rgba(255,250,245,.75));
  }
  .history-ttl{
    font-size:13px;
    font-weight:800;
    color:var(--text);
    letter-spacing:.08em;
  }
  .history-sub{
    margin-top:6px;
    font-size:11px;
    font-weight:700;
    color:var(--dim);
    line-height:1.5;
  }
  .new-chat-btn{
    border:none;
    border-radius:14px;
    padding:9px 14px;
    background:linear-gradient(135deg,var(--peach),var(--rose));
    color:#fff;
    font-family:'Nunito',sans-serif;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(238,139,123,.22);
    transition:transform .2s, box-shadow .2s;
    white-space:nowrap;
  }
  .new-chat-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(238,139,123,.3);
  }
  .history-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:16px;
    flex:1;
    min-height:0;
    overflow-y:auto;
  }
  .history-list::-webkit-scrollbar{ width:4px; }
  .history-list::-webkit-scrollbar-thumb{ background:var(--warm1); border-radius:4px; }
  .history-empty{
    padding:18px 12px;
    text-align:center;
    color:var(--dim);
    font-size:12px;
    font-weight:700;
    line-height:1.6;
  }
  .history-item{
    width:100%;
    border:none;
    border-radius:18px;
    padding:14px 14px 13px;
    text-align:left;
    cursor:pointer;
    background:linear-gradient(180deg,rgba(255,255,255,.75),rgba(255,247,241,.88));
    border:1.5px solid rgba(240,216,202,.9);
    transition:transform .18s, border-color .18s, box-shadow .18s, background .18s;
    color:inherit;
  }
  .history-item:hover{
    transform:translateY(-1px);
    border-color:rgba(246,169,122,.4);
    box-shadow:0 12px 24px rgba(246,169,122,.12);
  }
  .history-item.active{
    background:linear-gradient(180deg,rgba(255,243,233,.98),rgba(255,233,217,.94));
    border-color:rgba(246,169,122,.52);
    box-shadow:0 16px 28px rgba(246,169,122,.16);
  }
  .history-item-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }
  .history-item-title{
    flex:1;
    min-width:0;
    font-size:13px;
    font-weight:800;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .history-item-time{
    font-size:10px;
    font-weight:800;
    color:var(--dim);
    letter-spacing:.04em;
    flex-shrink:0;
  }
  .history-item-preview{
    font-size:11.5px;
    font-weight:600;
    color:var(--mid);
    line-height:1.55;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    word-break:break-word;
  }

  /* ── 日志 ── */
  .log-wrap{
    background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
    box-shadow:0 8px 32px var(--shadow); overflow:hidden;
    flex:1;
    min-height:0;
    display:flex; flex-direction:column;
    animation:fadeup .7s .08s ease both;
    position:relative;
  }
  .log-top{
    padding:16px 26px 13px; border-bottom:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    background:linear-gradient(to right,rgba(253,220,196,.3),transparent);
  }
  .log-top-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .dots{ display:flex; gap:6px; }
  .dots span{ width:9px; height:9px; border-radius:50%; }
  .dots span:nth-child(1){background:#FFBCB5;} .dots span:nth-child(2){background:#FFD6A5;} .dots span:nth-child(3){background:#C3E6CB;}
  .log-ttl{ font-size:12.5px; font-weight:700; color:var(--mid); letter-spacing:.05em; margin-left:4px; }
  .log-subttl{
    font-size:11px;
    font-weight:700;
    color:var(--dim);
    white-space:nowrap;
  }
  .log-body{
    flex:1; min-height:0; padding:28px 28px 26px; overflow-y:auto;
    display:flex; flex-direction:column; gap:14px;
    scroll-padding-bottom:18px;
  }
  .log-body::-webkit-scrollbar{ width:4px; }
  .log-body::-webkit-scrollbar-thumb{ background:var(--warm1); border-radius:4px; }
  .jump-bottom-btn{
    position:absolute;
    right:22px;
    bottom:18px;
    border:none;
    border-radius:999px;
    padding:10px 14px;
    background:rgba(107,64,51,.88);
    color:#fff;
    font-family:'Nunito',sans-serif;
    font-size:11.5px;
    font-weight:800;
    box-shadow:0 16px 26px rgba(107,64,51,.18);
    cursor:pointer;
    opacity:0;
    transform:translateY(10px);
    pointer-events:none;
    transition:opacity .18s, transform .18s;
    z-index:4;
  }
  .jump-bottom-btn.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .empty{ margin:auto; display:flex; flex-direction:column; align-items:center; gap:16px; color:var(--dim); }
  .empty-fl{ display:flex; gap:18px; align-items:flex-end; height:60px; }
  .dancer{ color:var(--peach); flex-shrink:0; transform-origin:center bottom; }
  .dancer-1{ animation:d-bounce .9s ease-in-out infinite; }
  .dancer-2{ animation:d-sway 1.1s ease-in-out infinite .18s; }
  .dancer-3{ animation:d-bounce .85s ease-in-out infinite .35s; }
  @keyframes d-bounce{
    0%,100%{ transform:translateY(0) rotate(-6deg); }
    50%    { transform:translateY(-14px) rotate(6deg); }
  }
  @keyframes d-sway{
    0%,100%{ transform:translateY(2px) rotate(-12deg); }
    50%    { transform:translateY(-10px) rotate(12deg); }
  }
  .empty p{ font-size:13.5px; font-weight:600; }

  .entry{ display:flex; align-items:flex-start; gap:12px; animation:ein .3s ease both; }
  @keyframes ein{ from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .eicon{ width:30px; height:30px; border-radius:10px; display:grid; place-items:center; font-size:14px; flex-shrink:0; margin-top:2px; }
  .ebubble{ flex:1; padding:10px 16px; border-radius:14px; font-size:13.5px; font-weight:500; line-height:1.65; }

  .type-start .eicon  { background:rgba(240,192,128,.25); }
  .type-start .ebubble{ background:rgba(240,192,128,.15); color:#9B6D2A; border:1px solid rgba(240,192,128,.3); }
  .type-user .eicon  { background:rgba(238,139,123,.18); }
  .type-user .ebubble{
    background:linear-gradient(135deg,rgba(255,242,233,.96),rgba(255,231,219,.94));
    color:#8d5444;
    border:1px solid rgba(238,139,123,.22);
    font-weight:700;
  }
  .type-step  .eicon  { background:rgba(246,169,122,.2); }
  .type-step  .ebubble{ background:rgba(246,169,122,.1); color:var(--mid); border:1px solid rgba(246,169,122,.2); }
  .type-result .eicon  { background:rgba(195,230,203,.4); }
  .type-result .ebubble{ background:rgba(195,230,203,.2); color:#3D7A50; border:1px solid rgba(195,230,203,.5); font-weight:700; }
  .type-error  .eicon  { background:rgba(238,139,123,.2); }
  .type-error  .ebubble{ background:rgba(238,139,123,.1); color:var(--rose); border:1px solid rgba(238,139,123,.25); }
  .entry.streaming .ebubble::after{
    content:'';
    display:inline-block;
    width:8px;
    height:8px;
    margin-left:8px;
    border-radius:50%;
    background:currentColor;
    opacity:.65;
    animation:typingPulse 1s ease-in-out infinite;
    vertical-align:middle;
  }
  @keyframes typingPulse{
    0%,100%{ transform:scale(.8); opacity:.35; }
    50%{ transform:scale(1.05); opacity:.9; }
  }
  .md-content > :first-child{ margin-top:0; }
  .md-content > :last-child{ margin-bottom:0; }
  .md-content h1,
  .md-content h2,
  .md-content h3,
  .md-content h4,
  .md-content h5,
  .md-content h6{
    margin:0 0 10px;
    line-height:1.35;
    color:inherit;
  }
  .md-content p{ margin:0 0 10px; white-space:normal; }
  .md-content ul,
  .md-content ol{
    margin:0 0 10px 20px;
    padding:0;
  }
  .md-content li + li{ margin-top:4px; }
  .md-content blockquote{
    margin:0 0 10px;
    padding:8px 12px;
    border-left:3px solid rgba(246,169,122,.5);
    background:rgba(255,255,255,.35);
    border-radius:10px;
  }
  .md-content pre{
    margin:0 0 10px;
    padding:12px 14px;
    overflow-x:auto;
    border-radius:12px;
    background:rgba(107,64,51,.09);
    border:1px solid rgba(107,64,51,.08);
  }
  .md-content .md-code-lang{
    margin:0 0 8px;
    font-size:10.5px;
    font-weight:800;
    letter-spacing:.06em;
    opacity:.7;
    text-transform:uppercase;
  }
  .md-content code{
    font-family:'SFMono-Regular','Menlo','Monaco','Consolas',monospace;
    font-size:.92em;
  }
  .md-content :not(pre) > code{
    padding:2px 6px;
    border-radius:7px;
    background:rgba(107,64,51,.09);
  }
  .md-content a{
    color:inherit;
    text-decoration:underline;
    text-decoration-color:rgba(107,64,51,.35);
    text-underline-offset:2px;
  }
  .md-content hr{
    border:none;
    border-top:1px solid rgba(107,64,51,.16);
    margin:12px 0;
  }

  /* ── 背景滚动卡片 ── */
  .bg-cards{
    position:fixed; z-index:1;
    top:-30%; left:-15%; right:-15%; bottom:-30%;
    transform:rotate(-15deg);
    display:flex; gap:32px; justify-content:center;
    opacity:.35; overflow:hidden;
  }
  .bg-cards:hover{ opacity:.6; }
  .bg-cards:hover .bg-col{ animation-play-state:paused; }

  .bg-col{
    display:flex; flex-direction:column; gap:24px;
    width:240px; flex-shrink:0;
  }
  .bg-col:nth-child(odd) { animation:bg-up   55s linear infinite; }
  .bg-col:nth-child(even){ animation:bg-down 60s linear infinite; }
  .bg-col:nth-child(1){ animation-duration:58s; }
  .bg-col:nth-child(2){ animation-duration:52s; }
  .bg-col:nth-child(3){ animation-duration:62s; }
  .bg-col:nth-child(4){ animation-duration:50s; }
  .bg-col:nth-child(5){ animation-duration:56s; }

  @keyframes bg-up  { 0%{transform:translateY(0)}    100%{transform:translateY(-50%)} }
  @keyframes bg-down{ 0%{transform:translateY(-50%)} 100%{transform:translateY(0)} }

  .bg-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:18px;
    padding:18px 20px; cursor:pointer; flex-shrink:0;
    transition:all .25s;
  }
  .bg-card:hover{
    background:var(--warm0); border-color:var(--peach);
    box-shadow:0 4px 16px rgba(246,169,122,.35);
    transform:scale(1.06);
  }
  .bg-cat{ display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--peach); margin-bottom:6px; }
  .bg-text{ font-size:14px; color:var(--mid); font-weight:500; line-height:1.55; }

  /* ── 输入 ── */
  .input-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
    padding:6px 6px 6px 6px; display:flex; flex-direction:column;
    box-shadow:0 8px 32px var(--shadow); transition:border-color .25s,box-shadow .25s;
    animation:fadeup .7s .22s ease both;
    position:relative;
    z-index:8;
  }
  .input-card:focus-within{
    border-color:var(--peach);
    box-shadow:0 8px 32px rgba(246,169,122,.2),0 0 0 3px rgba(246,169,122,.1);
  }
  .input-main{
    display:flex; align-items:flex-end; gap:12px; padding-left:18px;
  }
  #task-input{
    flex:1; background:transparent; border:none; outline:none;
    font-family:'Nunito',sans-serif; font-size:14.5px; font-weight:500; color:var(--text);
    resize:none; min-height:54px; max-height:140px; padding:16px 0; line-height:1.6;
  }
  #task-input::placeholder{ color:var(--dim); }
  .send-wrap{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; padding-bottom:4px; }
  #send-btn{
    width:48px; height:48px; border-radius:18px;
    background:linear-gradient(135deg,var(--peach),var(--rose));
    border:none; cursor:pointer; display:grid; place-items:center;
    font-size:20px; color:#fff;
    box-shadow:0 4px 14px rgba(238,139,123,.4); transition:all .2s;
  }
  #send-btn:hover:not(:disabled){ transform:translateY(-2px) scale(1.06); box-shadow:0 6px 20px rgba(238,139,123,.5); }
  #send-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .hint{ font-size:10.5px; color:var(--dim); font-weight:600; }

  /* ── Thinking level bar ── */
  .thinking-bar{
    display:flex; align-items:center; gap:14px;
    justify-content:space-between;
    padding:10px 18px 14px;
  }
  .mode-bar{
    display:flex; align-items:center; gap:12px;
    padding:10px 18px 0;
    flex-wrap:wrap;
  }
  .thinking-label{
    font-size:10px; font-weight:800; color:var(--dim); letter-spacing:.08em; white-space:nowrap;
  }
  .thinking-pills, .mode-pills{ display:flex; gap:4px; flex-wrap:wrap; }
  .mode-pills{
    padding:4px;
    border-radius:18px;
    border:1px solid rgba(246,169,122,.18);
    background:linear-gradient(180deg,rgba(255,251,247,.96),rgba(255,244,236,.92));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 10px 22px rgba(246,169,122,.08);
  }
  .thinking-control{
    position:relative;
    display:flex;
    align-items:center;
  }
  .thinking-btn{
    position:relative;
    width:46px;
    height:46px;
    padding:0;
    border-radius:16px;
    border:1.5px solid rgba(246,169,122,.22);
    background:linear-gradient(180deg,rgba(255,251,247,.98),rgba(255,239,228,.92));
    color:#b06f49;
    cursor:pointer;
    transition:all .2s;
    font-family:'Nunito',sans-serif;
    display:grid;
    place-items:center;
    box-shadow:0 10px 24px rgba(246,169,122,.1), inset 0 1px 0 rgba(255,255,255,.92);
  }
  .thinking-btn:hover,
  .thinking-btn.open{
    border-color:var(--peach);
    color:#d68453;
    background:linear-gradient(180deg,rgba(255,246,239,.98),rgba(255,231,214,.94));
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(246,169,122,.16), inset 0 1px 0 rgba(255,255,255,.94);
  }
  .thinking-icon{
    font-size:19px;
    line-height:1;
    transform:translateY(1px);
  }
  .thinking-badge{
    position:absolute;
    right:-7px;
    top:-7px;
    min-width:30px;
    padding:2px 7px;
    border-radius:999px;
    background:linear-gradient(135deg,var(--peach),#f0b16e);
    color:#fff;
    font-size:9px;
    font-weight:800;
    line-height:1.35;
    letter-spacing:.02em;
    box-shadow:0 8px 16px rgba(246,169,122,.24);
  }
  .thinking-drawer{
    position:absolute;
    right:0;
    bottom:calc(100% + 10px);
    width:286px;
    max-width:calc(100vw - 56px);
    padding:12px;
    border-radius:20px;
    border:1.5px solid rgba(246,169,122,.22);
    background:linear-gradient(180deg,rgba(255,250,245,.98),rgba(255,244,236,.96));
    box-shadow:0 20px 46px rgba(35,31,32,.16);
    backdrop-filter:blur(14px);
    opacity:0;
    transform:translateY(8px);
    pointer-events:none;
    transition:opacity .2s, transform .2s;
    z-index:30;
  }
  .thinking-drawer.open{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .thinking-drawer::after{
    content:'';
    position:absolute;
    right:16px;
    bottom:-8px;
    width:14px;
    height:14px;
    background:rgba(255,245,238,.98);
    border-right:1.5px solid rgba(246,169,122,.22);
    border-bottom:1.5px solid rgba(246,169,122,.22);
    transform:rotate(45deg);
  }
  .thinking-drawer-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:8px;
    padding:0 2px;
  }
  .thinking-drawer-head strong{
    font-size:11px;
    font-weight:800;
    color:var(--text);
    letter-spacing:.04em;
  }
  .thinking-drawer-head span{
    font-size:10px;
    font-weight:700;
    color:var(--dim);
  }
  .thinking-pills{
    display:grid;
    gap:6px;
  }
  .tp{
    padding:3px 12px; border-radius:10px; border:1.5px solid var(--border);
    background:transparent; font-family:'Nunito',sans-serif; font-size:11.5px; font-weight:600;
    color:var(--mid); cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  #mode-pills .tp{
    border:1px solid transparent;
    padding:8px 16px;
    border-radius:14px;
    color:#9b6c51;
    font-size:12px;
    font-weight:800;
  }
  #mode-pills .tp:hover{
    background:rgba(246,169,122,.08);
    border-color:rgba(246,169,122,.14);
    color:var(--text);
  }
  #thinking-pills .tp{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    width:100%;
    padding:10px 12px;
    border-radius:14px;
    text-align:left;
    border-color:rgba(246,169,122,.12);
    background:rgba(255,255,255,.58);
  }
  .tp-main{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .tp-main strong{
    font-size:11.5px;
    font-weight:800;
    color:inherit;
  }
  .tp-main span{
    font-size:10px;
    font-weight:700;
    color:var(--dim);
  }
  .tp-mark{
    font-size:13px;
    color:var(--peach);
    opacity:0;
    transform:translateX(-2px);
    transition:opacity .2s, transform .2s;
  }
  .tp:hover{ border-color:var(--peach); color:var(--peach); }
  .tp.active{
    background:linear-gradient(135deg,rgba(246,169,122,.15),rgba(238,139,123,.12));
    border-color:var(--peach); color:var(--peach);
  }
  #mode-pills .tp.active{
    background:linear-gradient(135deg,#fff6ef,#ffe2cf);
    border-color:rgba(246,169,122,.4);
    color:#d1804f;
    box-shadow:0 10px 20px rgba(246,169,122,.14), inset 0 1px 0 rgba(255,255,255,.9);
  }
  #thinking-pills .tp:hover{
    background:rgba(255,255,255,.82);
    box-shadow:0 8px 18px rgba(246,169,122,.08);
  }
  #thinking-pills .tp.active{
    background:linear-gradient(135deg,rgba(255,244,234,.98),rgba(255,232,214,.9));
    border-color:rgba(246,169,122,.34);
    color:#cf7e4f;
    box-shadow:0 10px 20px rgba(246,169,122,.12);
  }
  #thinking-pills .tp.active .tp-mark{
    opacity:1;
    transform:translateX(0);
  }
  #thinking-pills .tp.active .tp-main span{
    color:var(--peach);
  }

  /* ── Attach area ── */
  .attach-area{
    display:flex; align-items:center; gap:10px;
  }
  .attach-btn{
    width:46px;
    height:46px;
    border-radius:16px;
    border:1.5px solid rgba(246,169,122,.18);
    background:linear-gradient(180deg,rgba(255,251,247,.98),rgba(255,242,232,.92));
    padding:0;
    font-size:19px;
    cursor:pointer;
    transition:all .2s;
    line-height:1;
    color:#8f7a69;
    display:grid;
    place-items:center;
    box-shadow:0 10px 24px rgba(246,169,122,.08), inset 0 1px 0 rgba(255,255,255,.92);
  }
  .attach-btn:hover{
    border-color:var(--peach);
    background:linear-gradient(180deg,rgba(255,247,241,.98),rgba(255,233,218,.94));
    color:#d68453;
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(246,169,122,.14), inset 0 1px 0 rgba(255,255,255,.94);
  }
  .file-tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    flex:1;
    min-width:0;
    align-items:center;
  }
  .file-tag{
    display:flex; align-items:center; gap:4px;
    background:rgba(246,169,122,.12); border:1px solid rgba(246,169,122,.22);
    border-radius:999px; padding:5px 10px; font-size:11px; font-weight:700; color:var(--mid);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
  }
  .file-tag .remove{
    cursor:pointer; font-size:13px; color:var(--rose); line-height:1;
    margin-left:2px; font-weight:700;
  }
  .file-tag .remove:hover{ color:#d44; }

  /* ━━━ 底部 A ━━━ */
  .stage{
    position:fixed; bottom:0; left:0; right:0; height:108px;
    pointer-events:none; z-index:100; overflow:hidden;
  }
  .ground{
    position:absolute; bottom:36px; left:0; right:0; height:2px;
    background:linear-gradient(to right,transparent 0%,rgba(246,169,122,.3) 20%,rgba(246,169,122,.45) 50%,rgba(246,169,122,.3) 80%,transparent 100%);
  }

  /* A 本体 */
  #the-a{
    position:absolute;
    bottom:37px;
    left:50%;
    font-family:'Playfair Display',serif;
    font-size:46px; font-style:italic; font-weight:700;
    color:var(--peach);
    line-height:1;
    text-shadow:0 4px 16px rgba(246,169,122,.4);
    transform-origin:center bottom;
    will-change:transform;
    /* 待命：上下浮动 */
    animation:idle 3s ease-in-out infinite;
  }
  @keyframes idle{
    0%,100%{ transform:translateX(-50%) translateY(0) rotate(-3deg) scale(1); }
    50%     { transform:translateX(-50%) translateY(-7px) rotate(3deg) scale(1.04); }
  }

  /* 执行：原地慢滚 + 上下跳 */
  #the-a.rolling{
    color:var(--rose);
    text-shadow:0 4px 22px rgba(238,139,123,.55);
    animation:roll 3.2s ease-in-out infinite;
  }
  @keyframes roll{
    0%  { transform:translateX(-50%) translateY(0px)   rotate(0deg); }
    25% { transform:translateX(-50%) translateY(-12px) rotate(90deg); }
    50% { transform:translateX(-50%) translateY(0px)   rotate(180deg); }
    75% { transform:translateX(-50%) translateY(-12px) rotate(270deg); }
    100%{ transform:translateX(-50%) translateY(0px)   rotate(360deg); }
  }

  /* 滚动时地面阴影 */
  #the-a.rolling::after{
    content:'';
    position:absolute; bottom:-5px; left:50%;
    transform:translateX(-50%);
    width:28px; height:5px;
    background:radial-gradient(ellipse,rgba(238,139,123,.4) 0%,transparent 70%);
    border-radius:50%;
    animation:shd 3.2s ease-in-out infinite;
  }
  @keyframes shd{
    0%,50%,100%{ transform:translateX(-50%) scaleX(1);   opacity:.5; }
    25%,75%    { transform:translateX(-50%) scaleX(.4);  opacity:.15; }
  }

  .a-lbl{
    position:absolute; bottom:8px; left:50%;
    transform:translateX(-50%);
    font-size:10px; font-weight:700; color:var(--dim);
    letter-spacing:.14em; text-transform:uppercase; white-space:nowrap;
    transition:color .4s;
  }
  .a-lbl.active{
    color:var(--peach);
    animation:lblpulse 1.6s ease-in-out infinite;
  }
  @keyframes lblpulse{ 0%,100%{opacity:1} 50%{opacity:.45} }

  /* ── Monitoring Panel ── */
  .monitor-toggle{
    background:linear-gradient(180deg,#fff9f5,#fff1e4);
    border:1.5px solid rgba(246,169,122,.24);
    border-radius:999px;
    padding:8px 16px;
    font-family:'Nunito',sans-serif;
    font-size:12px;
    font-weight:800;
    color:var(--mid);
    cursor:pointer;
    transition:all .2s;
    margin-right:4px;
    box-shadow:0 8px 18px rgba(246,169,122,.12);
  }
  .monitor-toggle:hover{ border-color:var(--peach); color:var(--peach); transform:translateY(-1px); }
  .monitor-toggle.active{ background:rgba(246,169,122,.12); border-color:var(--peach); color:var(--peach); }

  .monitor-panel{
    background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
    box-shadow:0 20px 44px rgba(107,64,51,.16);
    overflow:hidden;
    position:fixed;
    right:32px;
    bottom:132px;
    width:min(440px, calc(100vw - 32px));
    max-height:calc(100vh - 188px);
    opacity:0;
    transform:translateY(16px) scale(.98);
    pointer-events:none;
    transition:opacity .22s ease, transform .22s ease;
    z-index:120;
    display:flex;
    flex-direction:column;
  }
  .monitor-panel.open{
    opacity:1;
    transform:translateY(0) scale(1);
    pointer-events:auto;
  }

  .monitor-top{
    padding:14px 24px 12px; border-bottom:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to right,rgba(238,139,123,.08),transparent);
  }
  .monitor-top-left{ display:flex; align-items:center; gap:10px; }
  .monitor-ttl{ font-size:12.5px; font-weight:700; color:var(--mid); letter-spacing:.05em; }
  .verbose-toggle{
    padding:3px 10px; border-radius:8px; border:1.5px solid var(--border);
    background:transparent; font-family:'Nunito',sans-serif; font-size:11px; font-weight:700;
    color:var(--dim); cursor:pointer; transition:all .2s;
  }
  .verbose-toggle:hover{ border-color:var(--peach); }
  .verbose-toggle.active{ background:rgba(238,139,123,.12); border-color:var(--rose); color:var(--rose); }

  .monitor-section{
    border-bottom:1.5px solid rgba(240,216,202,.72);
  }
  .monitor-section:last-of-type{
    border-bottom:none;
  }
  .monitor-section-head{
    padding:12px 24px 10px;
    font-size:11px;
    font-weight:800;
    color:var(--dim);
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .activity-body,
  .monitor-body{
    padding:0 24px 18px;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:8px;
  }
  .activity-body{
    max-height:220px;
  }
  .monitor-body{
    max-height:220px;
  }
  .activity-body::-webkit-scrollbar,
  .monitor-body::-webkit-scrollbar{ width:4px; }
  .activity-body::-webkit-scrollbar-thumb,
  .monitor-body::-webkit-scrollbar-thumb{ background:var(--warm1); border-radius:4px; }
  .monitor-empty{ text-align:center; padding:18px 8px; color:var(--dim); font-size:13px; font-weight:600; }
  .activity-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 12px;
    border-radius:14px;
    background:rgba(246,169,122,.08);
    border:1px solid rgba(246,169,122,.12);
  }
  .activity-icon{
    width:24px;
    height:24px;
    border-radius:8px;
    display:grid;
    place-items:center;
    background:rgba(255,255,255,.7);
    flex-shrink:0;
    font-size:12px;
  }
  .activity-text{
    flex:1;
    min-width:0;
    font-size:12.5px;
    font-weight:600;
    color:var(--mid);
    line-height:1.55;
    word-break:break-word;
  }
  .activity-time{
    margin-top:4px;
    font-size:10px;
    font-weight:700;
    color:var(--dim);
  }

  .timeline-item{
    display:flex; align-items:center; gap:10px; padding:6px 10px;
    border-radius:10px; font-size:12.5px; font-weight:500; transition:background .15s;
  }
  .timeline-item:hover{ background:rgba(246,169,122,.06); }

  .tl-layer{
    display:inline-block; padding:2px 8px; border-radius:6px;
    font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    min-width:72px; text-align:center; flex-shrink:0;
  }
  .tl-layer.orchestrator{ background:rgba(240,192,128,.2); color:#9B6D2A; }
  .tl-layer.agent{ background:rgba(246,169,122,.18); color:#C06830; }
  .tl-layer.tool{ background:rgba(195,230,203,.3); color:#3D7A50; }
  .tl-layer.llm{ background:rgba(238,139,123,.15); color:var(--rose); }

  .tl-event{ font-weight:600; min-width:36px; }
  .tl-event.start{ color:#9B6D2A; }
  .tl-event.end{ color:#3D7A50; }
  .tl-event.error{ color:var(--rose); }

  .tl-name{ flex:1; color:var(--text); }
  .tl-dur{ color:var(--mid); font-size:11.5px; font-weight:600; min-width:60px; text-align:right; }

  .tl-verbose{
    font-size:11px; color:var(--mid); padding:2px 10px 6px 92px;
    word-break:break-all; line-height:1.4; opacity:.75;
  }

  .monitor-stats{
    padding:12px 24px; border-top:1.5px solid var(--border);
    display:flex; gap:24px; flex-wrap:wrap;
    background:linear-gradient(to right,rgba(253,220,196,.12),transparent);
  }
  .stat-item{ display:flex; align-items:center; gap:6px; }
  .stat-label{ font-size:11px; font-weight:600; color:var(--dim); }
  .stat-value{ font-size:13px; font-weight:800; color:var(--text); }
  .stat-value.error-val{ color:var(--rose); }

  @media (max-width: 980px){
    html,body{
      overflow:auto;
    }
    :root{
      --page-gutter: 18px;
      --top-bar-height: 176px;
      --bottom-stage-space: 164px;
    }
    header{
      top:12px;
      left:50%;
      transform:translateX(-50%);
      grid-template-columns:1fr;
      gap:14px;
      padding:18px;
    }
    .logo{
      justify-content:center;
    }
    .ws-badge{
      justify-self:center;
    }
    .welcome p{
      white-space:normal;
    }
    .app-shell{
      grid-template-columns:1fr;
      gap:20px;
      width:min(var(--shell-width), calc(100vw - (var(--page-gutter) * 2)));
      height:auto;
      min-height:100vh;
      padding:calc(var(--top-bar-height) + 18px) 0 var(--bottom-stage-space);
      overflow:visible;
    }
    .history-panel{
      height:auto;
      max-height:320px;
    }
    .history-list{
      max-height:none;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    }
    .monitor-panel{
      right:16px;
      bottom:118px;
      width:min(420px, calc(100vw - 24px));
      max-height:calc(100vh - 150px);
    }
  }

  @media (max-width: 720px){
    :root{
      --page-gutter: 12px;
      --top-bar-height: 196px;
      --bottom-stage-space: 168px;
    }
    header{
      top:10px;
      padding:16px 14px;
      border-radius:24px;
    }
    .welcome h1{
      font-size:28px;
    }
    .history-top{
      flex-direction:column;
      align-items:stretch;
    }
    .new-chat-btn{
      width:100%;
      justify-content:center;
    }
    .log-top{
      padding:14px 18px 12px;
    }
    .log-body{
      padding:20px 18px;
    }
    .monitor-panel{
      left:12px;
      right:12px;
      width:auto;
      bottom:108px;
      max-height:calc(100vh - 138px);
    }
    .ws-badge{
      width:100%;
      justify-content:center;
      flex-wrap:wrap;
      border-radius:22px;
    }
    .monitor-top,
    .monitor-section-head,
    .activity-body,
    .monitor-body,
    .monitor-stats{
      padding-left:18px;
      padding-right:18px;
    }
  }
</style>
</head>
<body>

<!-- 背景滚动卡片 -->
<div class="bg-cards" id="bg-cards"></div>

<header>
  <div class="logo">
    <div class="logo-icon">d</div>
    <div class="logo-name">chat dada</div>
  </div>
  <div class="welcome">
    <h1>今天想做什么呀？</h1>
    <p>告诉我任务，我来帮你搜索、整理、操作 ✦</p>
  </div>
  <div class="ws-badge">
    <button class="monitor-toggle" id="monitor-toggle" onclick="toggleMonitor()">执行详情</button>
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-txt">连接中</span>
  </div>
</header>

<div class="app-shell">
<aside class="history-panel">
  <div class="history-top">
    <div>
      <div class="history-ttl">历史对话</div>
      <div class="history-sub">连续问答会保留在同一个会话里</div>
    </div>
    <button class="new-chat-btn" id="new-chat-btn" type="button">+ 新对话</button>
  </div>
  <div class="history-list" id="history-list"></div>
</aside>

<main>
  <div class="chat-layout">
    <div class="log-wrap">
      <div class="log-top">
        <div class="log-top-left">
          <div class="dots"><span></span><span></span><span></span></div>
          <span class="log-ttl">对话内容</span>
        </div>
        <span class="log-subttl">长回复可在这里单独滚动查看</span>
      </div>
      <div class="log-body" id="log-body">
        <div class="empty" id="empty">
          <div class="empty-fl">
            <!-- 举双手跳 -->
            <svg class="dancer dancer-1" width="34" height="56" viewBox="0 0 34 56" fill="none">
              <circle cx="17" cy="8" r="6.5" stroke="currentColor" stroke-width="2.4"/>
              <line x1="17" y1="15" x2="17" y2="36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="23" x2="5"  y2="11" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="23" x2="29" y2="11" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="36" x2="8"  y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="36" x2="26" y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            <!-- 迪斯科 一手上一手下 -->
            <svg class="dancer dancer-2" width="34" height="56" viewBox="0 0 34 56" fill="none">
              <circle cx="17" cy="8" r="6.5" stroke="currentColor" stroke-width="2.4"/>
              <line x1="17" y1="15" x2="17" y2="36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="22" x2="4"  y2="12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="22" x2="30" y2="30" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="36" x2="7"  y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="36" x2="27" y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            <!-- 张开双臂扭 -->
            <svg class="dancer dancer-3" width="34" height="56" viewBox="0 0 34 56" fill="none">
              <circle cx="17" cy="8" r="6.5" stroke="currentColor" stroke-width="2.4"/>
              <line x1="17" y1="15" x2="17" y2="36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="23" x2="2"  y2="23" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="23" x2="32" y2="23" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="36" x2="8"  y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="17" y1="36" x2="26" y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
          </div>
          <p>还没有任务哦，输入一个试试吧～</p>
        </div>
      </div>
      <button class="jump-bottom-btn" id="jump-bottom-btn" type="button">回到底部</button>
    </div>

    <div class="input-card">
      <div class="input-main">
        <textarea id="task-input" placeholder="描述你的任务，比如：帮我搜索今天 AI 新闻，整理成要点保存到桌面…" rows="2"></textarea>
        <div class="send-wrap">
          <button id="send-btn" onclick="sendTask()" title="发送 (Ctrl+Enter)">
            <span id="btn-icon">✦</span>
          </button>
          <div class="hint">Ctrl ↵</div>
        </div>
      </div>
      <div class="mode-bar">

<script>
const API_BASE_OVERRIDE_KEY = 'chat-dada-api-base';
const CONVERSATIONS_KEY = 'chat-dada-conversations-v1';
const ACTIVE_CONVERSATION_KEY = 'chat-dada-active-conversation';
const API_BASE = resolveApiBase();
const ACTIVE_TASK_KEY = 'chat-dada-active-task';
const TASK_MODE_KEY = 'chat-dada-task-mode';
const USER_ID_KEY = 'chat-dada-user-id';
const TASK_SEQ_PREFIX = 'chat-dada-task-seq:';
const TASK_EVENTS_PREFIX = 'chat-dada-task-events:';
const DEFAULT_TASK_PLACEHOLDER = '描述你的任务，比如：帮我搜索今天 AI 新闻，整理成要点保存到桌面…';
const MAX_CACHED_EVENTS = 800;
const MAX_CONVERSATIONS = 24;
const MAX_CONVERSATION_ENTRIES = 240;

const EMPTY_ACTIVITY_TEMPLATE = document.getElementById('activity-body').innerHTML;
const EMPTY_MONITOR_TEMPLATE = document.getElementById('monitor-body').innerHTML;
const PRIMARY_ENTRY_TYPES = new Set(['user', 'user_reply', 'question', 'result', 'error', 'file']);
const ACTIVITY_EVENT_TYPES = new Set(['start', 'step', 'file', 'question', 'user_reply', 'error']);
const LOG_BOTTOM_THRESHOLD = 64;

let eventSource = null;
let running = false;
let runTimer = null;
let taskMode = localStorage.getItem(TASK_MODE_KEY) || 'auto';
let thinkingLevel = 'medium';
let pendingFiles = [];

let activeConversationId = localStorage.getItem(ACTIVE_CONVERSATION_KEY) || '';
let reconnectNoticeShown = false;
let terminalEventSeen = false;
let activeResultEntry = null;
let activeResultBubble = null;
let activeResultContent = '';
let activeResultEntryId = '';
let activeResultTaskId = '';
let logAutoStick = true;
let awaitingReplyTaskId = '';
let awaitingReplyQuestion = '';
let awaitingReplyPlaceholder = '';

const icons = {
  start:'🌟',
  user:'🙋',
  user_reply:'🙋',
  question:'❓',
  step:'✦',
  file:'📎',
  result:'🎉',
  error:'🌧️',
  result_delta:'💬',
};

function normalizeApiBase(base) {
  return String(base || '').trim().replace(/\/+$/, '');
}

function defaultLocalApiBase() {
  const protocol = location.protocol === 'https:' ? 'https:' : 'http:';
  const hostname = location.hostname || '127.0.0.1';
  return `${protocol}//${hostname}:8000`;
}

function resolveApiBase() {
  const params = new URLSearchParams(location.search);
  const queryBase = normalizeApiBase(params.get('api_base'));
  if (queryBase) {
    localStorage.setItem(API_BASE_OVERRIDE_KEY, queryBase);
    return queryBase;
  }

  const storedBase = normalizeApiBase(localStorage.getItem(API_BASE_OVERRIDE_KEY));
  if (storedBase) {
    return storedBase;
  }

  if (location.protocol !== 'http:' && location.protocol !== 'https:') {
    return defaultLocalApiBase();
  }

  if (location.port === '8000' || location.port === '' || location.port === '80' || location.port === '443') {
    return location.origin;
  }

  return defaultLocalApiBase();
}

function apiUrl(path) {
  return `${API_BASE}${path}`;
}

async function readResponsePayload(res) {
  const text = await res.text();
  const contentType = res.headers.get('content-type') || '';

  if (!text) {
    return { data: null, text: '', contentType };
  }

  if (contentType.includes('application/json')) {
    try {
      return { data: JSON.parse(text), text, contentType };
    } catch {
      throw new Error(`服务端返回了无效 JSON（${res.status}）`);
    }
  }

  try {
    return { data: JSON.parse(text), text, contentType };
  } catch {
    return { data: null, text, contentType };
  }
}

function responseErrorMessage(res, payload, fallback) {
  if (payload?.data?.detail) return String(payload.data.detail);
  if (payload?.data?.error) return String(payload.data.error);
  if (payload?.text) return payload.text.slice(0, 300);
  return `${fallback}（${res.status}）`;
}

function nowIso() {
  return new Date().toISOString();
}

function makeId(prefix) {
  const random = window.crypto?.randomUUID?.() || Math.random().toString(36).slice(2);
  return `${prefix}-${random}`;
}

function deriveConversationTitle(text) {
  const normalized = String(text || '').replace(/\s+/g, ' ').trim();
  return normalized.slice(0, 28) || '新对话';
}

function truncateText(text, max = 60) {
  const normalized = String(text || '').replace(/\s+/g, ' ').trim();
  return normalized.length > max ? `${normalized.slice(0, max - 1)}…` : normalized;
}

function normalizeConversationEntry(entry) {
  return {
    id: String(entry?.id || makeId('entry')),
    type: String(entry?.type || 'step'),
    content: String(entry?.content || ''),
    render: entry?.render === 'markdown' ? 'markdown' : 'text',
    taskId: entry?.taskId ? String(entry.taskId) : '',
    name: entry?.name ? String(entry.name) : '',
    url: entry?.url ? String(entry.url) : '',
    createdAt: entry?.createdAt ? String(entry.createdAt) : nowIso(),
  };
}

function normalizeConversation(conversation) {
  const createdAt = conversation?.createdAt ? String(conversation.createdAt) : nowIso();
  const entries = Array.isArray(conversation?.entries)
    ? conversation.entries.map(normalizeConversationEntry).slice(-MAX_CONVERSATION_ENTRIES)
    : [];
  return {
    id: String(conversation?.id || makeId('conv')),
    title: String(conversation?.title || '新对话'),
    createdAt,
    updatedAt: conversation?.updatedAt ? String(conversation.updatedAt) : createdAt,
    lastTaskId: conversation?.lastTaskId ? String(conversation.lastTaskId) : '',
    entries,
  };
}

function loadConversations() {
  try {
    const raw = localStorage.getItem(CONVERSATIONS_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.map(normalizeConversation) : [];
  } catch {
    return [];
  }
}

function sortConversations() {
  conversations.sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
}

function saveConversations() {
  sortConversations();
  conversations = conversations.slice(0, MAX_CONVERSATIONS);
  localStorage.setItem(CONVERSATIONS_KEY, JSON.stringify(conversations));
}

function getConversationIndex(conversationId) {
  return conversations.findIndex(item => item.id === conversationId);
}

function getConversation(conversationId = activeConversationId) {
  const index = getConversationIndex(conversationId);
  return index >= 0 ? conversations[index] : null;
}

function createConversation(title = '新对话') {
  const createdAt = nowIso();
  const conversation = normalizeConversation({
    id: makeId('conv'),
    title,
    createdAt,
    updatedAt: createdAt,
    lastTaskId: '',
    entries: [],
  });
  conversations.unshift(conversation);
  saveConversations();
  return conversation;
}

function ensureActiveConversation() {
  if (!conversations.length) {
    const conversation = createConversation();
    activeConversationId = conversation.id;
    localStorage.setItem(ACTIVE_CONVERSATION_KEY, activeConversationId);
    return conversation;
  }

  let conversation = getConversation(activeConversationId);
  if (!conversation) {
    conversation = conversations[0];
    activeConversationId = conversation.id;
    localStorage.setItem(ACTIVE_CONVERSATION_KEY, activeConversationId);
  }
  return conversation;
}

function conversationPreview(conversation) {
  const meaningful = [...conversation.entries].reverse().find(entry =>
    ['user', 'user_reply', 'question', 'result', 'error', 'file'].includes(entry.type) && (entry.content || entry.name)
  ) || conversation.entries[conversation.entries.length - 1];

  if (!meaningful) return '还没有消息';
  if (meaningful.type === 'file') return `文件：${meaningful.name || meaningful.content}`;
  return truncateText(meaningful.content || meaningful.name || '', 44) || '还没有消息';
}

function isPrimaryConversationEntryType(type) {
  return PRIMARY_ENTRY_TYPES.has(String(type || ''));
}

function isActivityEventType(type) {
  return ACTIVITY_EVENT_TYPES.has(String(type || ''));
}

function entryVisualType(type) {
  return {
    file: 'step',
    result_delta: 'result',
    question: 'step',
    user_reply: 'user',
  }[String(type || '')] || String(type || '');
}

function formatConversationTime(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  if (Number.isNaN(date.getTime())) return '';

  const now = new Date();
  const sameDay = date.toDateString() === now.toDateString();
  if (sameDay) {
    return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }
  return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
}

function showEmptyStateIfNeeded() {
  const body = document.getElementById('log-body');
  if (body.children.length === 0) {
    body.innerHTML = EMPTY_LOG_TEMPLATE;
  }
  updateJumpBottomButton();
}

function touchConversation(conversation, updates = {}) {
  const nextTitle = updates.title;
  const shouldUpdateTitle = Boolean(nextTitle) && (!conversation.title || conversation.title === '新对话');
  const rest = { ...updates };
  delete rest.title;
  Object.assign(conversation, rest);
  if (shouldUpdateTitle) {
    conversation.title = String(nextTitle);
  }
  conversation.updatedAt = nowIso();
}

function addOrUpdateConversationEntry(entry, conversationId = activeConversationId) {
  const conversation = getConversation(conversationId);
  if (!conversation) return null;

  const normalized = normalizeConversationEntry(entry);
  const existingIndex = conversation.entries.findIndex(item => item.id === normalized.id);
  if (existingIndex >= 0) {
    conversation.entries[existingIndex] = {
      ...conversation.entries[existingIndex],
      ...normalized,
    };
  } else {
    conversation.entries.push(normalized);
    if (conversation.entries.length > MAX_CONVERSATION_ENTRIES) {
      conversation.entries = conversation.entries.slice(-MAX_CONVERSATION_ENTRIES);
    }
  }

  const updates = {};
  if (normalized.taskId) updates.lastTaskId = normalized.taskId;
  if (normalized.type === 'user' && normalized.content.trim()) {
    updates.title = deriveConversationTitle(normalized.content);
  }
  touchConversation(conversation, updates);
  saveConversations();
  renderConversationList();
  return normalized;
}

function setDot(state) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-txt');
  const states = {
    on: ['on', '已连接'],
    off: ['', '重连中…'],

  };
  const [cls, label] = states[state] || states.idle;
  dot.className = 'ws-dot' + (cls ? ' ' + cls : '');
  txt.textContent = label;
}

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function escAttr(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function safeHref(value) {
  const href = String(value ?? '').trim();
  if (/^(https?:\/\/|mailto:|\/)/i.test(href)) return href;
  return '#';
}

function restorePlaceholders(text, store, prefix) {
  return text.replace(new RegExp(`@@${prefix}_(\\d+)@@`, 'g'), (_, index) => store[Number(index)] || '');
}

function renderInlineMarkdown(text) {
  const inlineStore = [];
  let rendered = esc(text);

  rendered = rendered.replace(/`([^`]+)`/g, (_, code) => {
    const token = inlineStore.push(`<code>${code}</code>`) - 1;
    return `@@INLINE_${token}@@`;
  });

  rendered = rendered.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, label, href) => {
    const safe = safeHref(href);
    return `<a href="${escAttr(safe)}" target="_blank" rel="noopener noreferrer">${label}</a>`;
  });
  rendered = rendered.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  rendered = rendered.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');
  rendered = rendered.replace(/~~([^~]+)~~/g, '<del>$1</del>');

  return restorePlaceholders(rendered, inlineStore, 'INLINE');
}

function renderMarkdown(text) {
  const normalized = String(text ?? '').replace(/\r\n?/g, '\n').trim();
  if (!normalized) {
    return '<div class="md-content"></div>';
  }

  const blockStore = [];
  let source = normalized.replace(/```([^\n`]*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const language = String(lang || '').trim();
    const label = language ? `<div class="md-code-lang">${esc(language)}</div>` : '';
    const token = blockStore.push(
      `<pre>${label}<code>${esc(code.replace(/\n$/, ''))}</code></pre>`
    ) - 1;
    return `@@BLOCK_${token}@@`;
  });

  const lines = source.split('\n');
  const html = [];
  let paragraph = [];
  let blockquote = [];
  let listType = '';
  let listItems = [];

  const flushParagraph = () => {
    if (!paragraph.length) return;
    html.push(`<p>${renderInlineMarkdown(paragraph.join('<br>'))}</p>`);
    paragraph = [];
  };

  const flushBlockquote = () => {
    if (!blockquote.length) return;
    html.push(`<blockquote>${renderInlineMarkdown(blockquote.join('<br>'))}</blockquote>`);
    blockquote = [];
  };

  const flushList = () => {
    if (!listType || !listItems.length) return;
    const tag = listType;
    html.push(`<${tag}>${listItems.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</${tag}>`);
    listType = '';
    listItems = [];
  };

  const flushAll = () => {
    flushParagraph();
    flushBlockquote();
    flushList();
  };

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();
    const trimmed = line.trim();

    if (!trimmed) {
      flushAll();
      continue;
    }

    if (/^@@BLOCK_\d+@@$/.test(trimmed)) {
      flushAll();
      html.push(trimmed);
      continue;
    }

    const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
    if (headingMatch) {
      flushAll();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^([-*_])(?:\s*\1){2,}$/.test(trimmed)) {
      flushAll();
      html.push('<hr>');
      continue;
    }

    const quoteMatch = trimmed.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      blockquote.push(quoteMatch[1]);
      continue;
    }
    flushBlockquote();

    const ulMatch = trimmed.match(/^[-*+]\s+(.+)$/);
    if (ulMatch) {
      flushParagraph();
      if (listType && listType !== 'ul') flushList();
      listType = 'ul';
      listItems.push(ulMatch[1]);
      continue;
    }

    const olMatch = trimmed.match(/^\d+\.\s+(.+)$/);
    if (olMatch) {
      flushParagraph();
      if (listType && listType !== 'ol') flushList();
      listType = 'ol';
      listItems.push(olMatch[1]);
      continue;
    }

    flushList();
    paragraph.push(trimmed);
  }

  flushAll();
  return `<div class="md-content">${restorePlaceholders(html.join(''), blockStore, 'BLOCK')}</div>`;
}

function getUserId() {
  let userId = localStorage.getItem(USER_ID_KEY);
  if (!userId) {
    userId = 'web-' + (window.crypto?.randomUUID?.() || Math.random().toString(36).slice(2));
    localStorage.setItem(USER_ID_KEY, userId);
  }
  return userId;
}

function applyTaskMode(mode) {
  const normalizedMode = ['auto', 'chat', 'agent'].includes(mode) ? mode : 'auto';
  taskMode = normalizedMode;
  localStorage.setItem(TASK_MODE_KEY, normalizedMode);
  document.querySelectorAll('#mode-pills .tp').forEach(item => {
    item.classList.toggle('active', item.dataset.mode === normalizedMode);
  });
}

function applyThinkingLevel(level) {
  const normalizedLevel = ['low', 'medium', 'high'].includes(level) ? level : 'medium';
  const labels = {
    low: '轻量',
    medium: '标准',
    high: '深度',
  };
  thinkingLevel = normalizedLevel;
  document.querySelectorAll('#thinking-pills .tp').forEach(item => {
    item.classList.toggle('active', item.dataset.level === normalizedLevel);
  });
  document.getElementById('thinking-current-label').textContent = labels[normalizedLevel];
}

function setThinkingDrawerOpen(isOpen) {
  const toggle = document.getElementById('thinking-toggle');
  const drawer = document.getElementById('thinking-drawer');
  toggle.classList.toggle('open', isOpen);
  toggle.setAttribute('aria-expanded', String(isOpen));
  drawer.classList.toggle('open', isOpen);
}

function toggleThinkingDrawer() {
  const drawer = document.getElementById('thinking-drawer');
  setThinkingDrawerOpen(!drawer.classList.contains('open'));
}

function taskSeqKey(taskId) {
  return `${TASK_SEQ_PREFIX}${taskId}`;
}

function taskEventsKey(taskId) {
  return `${TASK_EVENTS_PREFIX}${taskId}`;
}

function getLastSeq(taskId) {
  return Number(sessionStorage.getItem(taskSeqKey(taskId)) || '0');
}

function setLastSeq(taskId, seq) {
  sessionStorage.setItem(taskSeqKey(taskId), String(seq));
}

function getCachedEvents(taskId) {
  try {
    const raw = sessionStorage.getItem(taskEventsKey(taskId));
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function setCachedEvents(taskId, events) {
  sessionStorage.setItem(taskEventsKey(taskId), JSON.stringify(events.slice(-MAX_CACHED_EVENTS)));
}

function cacheEvent(taskId, event) {
  const events = getCachedEvents(taskId);
  if (events.some(item => Number(item.seq) === Number(event.seq))) return;
  events.push(event);
  events.sort((a, b) => Number(a.seq) - Number(b.seq));
  setCachedEvents(taskId, events);
  setLastSeq(taskId, Number(event.seq || 0));
}

function clearCachedTask(taskId) {
  sessionStorage.removeItem(taskSeqKey(taskId));
  sessionStorage.removeItem(taskEventsKey(taskId));
}

function closeEventSource() {
  if (!eventSource) return;
  eventSource.close();
  eventSource = null;
}

function setActiveTask(taskId) {
  activeTaskId = taskId;
  sessionStorage.setItem(ACTIVE_TASK_KEY, taskId);
}

function clearActiveTask() {
  closeEventSource();
  activeTaskId = '';
  sessionStorage.removeItem(ACTIVE_TASK_KEY);
  reconnectNoticeShown = false;
  terminalEventSeen = false;
  refreshTaskStateUi();
}

function shakeInput() {
  const card = document.querySelector('.input-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'shake .4s ease';
  setTimeout(() => { card.style.animation = ''; }, 400);
}

function isActiveTaskAwaitingReply() {
  return Boolean(activeTaskId && awaitingReplyTaskId && activeTaskId === awaitingReplyTaskId);
}

function setReplyMode(taskId, question = {}) {
  awaitingReplyTaskId = taskId || '';
  awaitingReplyQuestion = String(question.content || '').trim();
  awaitingReplyPlaceholder = String(question.placeholder || '').trim();
  refreshTaskStateUi();
}

function clearReplyMode(taskId = '') {
  if (taskId && awaitingReplyTaskId && awaitingReplyTaskId !== taskId) return;
  awaitingReplyTaskId = '';
  awaitingReplyQuestion = '';
  awaitingReplyPlaceholder = '';
  refreshTaskStateUi();
}

function refreshTaskStateUi() {
  const input = document.getElementById('task-input');
  const sendBtn = document.getElementById('send-btn');
  const btnIcon = document.getElementById('btn-icon');
  const a = document.getElementById('the-a');
  const lbl = document.getElementById('a-lbl');
  const waitingForReply = !running && isActiveTaskAwaitingReply();

  sendBtn.disabled = running;
  btnIcon.textContent = running ? '···' : (waitingForReply ? '↩' : '✦');
  input.placeholder = waitingForReply
    ? (awaitingReplyPlaceholder || '请回复当前研究问题，任务将继续执行…')
    : DEFAULT_TASK_PLACEHOLDER;

  if (running) {
    a.classList.add('rolling');
    lbl.textContent = '执行中～';
    lbl.classList.add('active');
    return;
  }

  a.classList.remove('rolling');
  if (waitingForReply) {
    lbl.textContent = '等待补充';
    lbl.classList.add('active');
    return;
  }

  lbl.textContent = '待命中';
  lbl.classList.remove('active');
}

function setRunning(nextRunning) {
  running = nextRunning;
  clearTimeout(runTimer);
  if (nextRunning) {
    runTimer = setTimeout(() => {
      if (!running) return;
      addLog('error', '执行超时（90s），Agent 长时间无响应。请检查服务端日志或网络状态。');
      setRunning(false);
      setDot('off');
    }, 90000);
  }
  refreshTaskStateUi();
}

function clearLog() {
  document.getElementById('log-body').innerHTML = '';
  activeResultEntry = null;
  activeResultBubble = null;
  activeResultContent = '';
  activeResultEntryId = '';
  activeResultTaskId = '';
  logAutoStick = true;
  showEmptyStateIfNeeded();
}

function isLogNearBottom() {
  const body = document.getElementById('log-body');
  if (!body) return true;
  return body.scrollHeight - body.clientHeight - body.scrollTop <= LOG_BOTTOM_THRESHOLD;
}

function updateJumpBottomButton() {
  const body = document.getElementById('log-body');
  const button = document.getElementById('jump-bottom-btn');
  if (!body || !button) return;
  const hasOverflow = body.scrollHeight - body.clientHeight > LOG_BOTTOM_THRESHOLD;
  button.classList.toggle('show', hasOverflow && !logAutoStick);
}

function handleLogScroll() {
  logAutoStick = isLogNearBottom();
  updateJumpBottomButton();
}

function scrollLogToBottom(smooth = true, force = false) {
  const body = document.getElementById('log-body');
  if (!body) return;
  if (!force && !logAutoStick) {
    updateJumpBottomButton();
    return;
  }
  body.scrollTo({ top: body.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  logAutoStick = true;
  updateJumpBottomButton();
}

function setBubbleContent(bubble, content, options = {}) {
  if (!bubble) return;
  bubble.innerHTML = options.render === 'markdown'
    ? renderMarkdown(content)
    : (options.html ? content : esc(content));
}

function addLog(type, content, options = {}) {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();

  const body = document.getElementById('log-body');
  const el = document.createElement('div');
  const visualType = entryVisualType(type);
  el.className = `entry type-${visualType}`;
  if (options.entryId) el.dataset.entryId = options.entryId;
  el.innerHTML = `<div class="eicon">${icons[type] || '·'}</div><div class="ebubble"></div>`;
  const bubble = el.querySelector('.ebubble');
  setBubbleContent(bubble, content, options);
  body.appendChild(el);
  if (options.autoscroll !== false) {
    scrollLogToBottom(true);
  }
  return el;
}

function findRenderedEntry(entryId) {
  return entryId ? document.querySelector(`[data-entry-id="${entryId}"]`) : null;
}

function renderConversationEntry(entry, options = {}) {
  if (entry.type === 'file') {
    const label = esc(entry.name || entry.content || '下载文件');
    const href = esc(entry.url || '#');
    return addLog(
      'file',
      `已生成文件：<a href="${href}" target="_blank" rel="noopener">${label}</a>`,
      { html: true, entryId: entry.id, autoscroll: options.autoscroll }
    );
  }

  const render = entry.type === 'result' ? 'markdown' : undefined;
  const element = addLog(entry.type, entry.content || '', { render, entryId: entry.id, autoscroll: options.autoscroll });
  if (entry.type === 'result' && entry.taskId && entry.taskId === activeTaskId && running) {
    element.classList.add('streaming');
  }
  return element;
}

function upsertRenderedConversationEntry(entry, options = {}) {
  const existing = findRenderedEntry(entry.id);
  if (!existing) {
    const created = renderConversationEntry(entry);
    if (entry.type === 'result' && options.streaming) {
      created.classList.add('streaming');
    }
    return created;
  }

  existing.className = `entry type-${entryVisualType(entry.type)}`;
  if (entry.type === 'result' && options.streaming) {
    existing.classList.add('streaming');
  } else {
    existing.classList.remove('streaming');
  }

  const bubble = existing.querySelector('.ebubble');
  if (entry.type === 'file') {
    const label = esc(entry.name || entry.content || '下载文件');
    const href = esc(entry.url || '#');
    setBubbleContent(
      bubble,
      `已生成文件：<a href="${href}" target="_blank" rel="noopener">${label}</a>`,
      { html: true }
    );
  } else {
    setBubbleContent(bubble, entry.content || '', { render: entry.type === 'result' ? 'markdown' : undefined });
  }
  return existing;
}

function renderConversationList() {
  const list = document.getElementById('history-list');
  const items = [...conversations];
  list.innerHTML = '';

  if (!items.length) {
    list.innerHTML = '<div class="history-empty">还没有历史对话，先发起一轮新聊天吧。</div>';
    return;
  }

  for (const conversation of items) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `history-item${conversation.id === activeConversationId ? ' active' : ''}`;
    button.dataset.conversationId = conversation.id;
    button.innerHTML = `
      <div class="history-item-head">
        <span class="history-item-title">${esc(conversation.title || '新对话')}</span>
        <span class="history-item-time">${esc(formatConversationTime(conversation.updatedAt))}</span>
      </div>
      <div class="history-item-preview">${esc(conversationPreview(conversation))}</div>
    `;
    list.appendChild(button);
  }
}

function renderActiveConversation() {
  clearLog();
  const conversation = getConversation();
  if (!conversation || !conversation.entries.length) {
    showEmptyStateIfNeeded();
    scrollLogToBottom(false, true);
    return;
  }

  for (const entry of conversation.entries) {
    if (!isPrimaryConversationEntryType(entry.type)) continue;
    renderConversationEntry(entry, { autoscroll: false });
  }
  scrollLogToBottom(false, true);
}

function setSelectedTask(taskId) {
  if (taskId) {
    setActiveTask(taskId);
  } else {
    closeEventSource();
    activeTaskId = '';
    sessionStorage.removeItem(ACTIVE_TASK_KEY);
    reconnectNoticeShown = false;
    terminalEventSeen = false;
  }
  refreshTaskStateUi();
}

function setActiveConversation(conversationId) {
  const conversation = getConversation(conversationId);
  if (!conversation) return;

  closeEventSource();
  activeConversationId = conversation.id;
  localStorage.setItem(ACTIVE_CONVERSATION_KEY, activeConversationId);
  setSelectedTask(conversation.lastTaskId || '');
  setRunning(false);
  setDot('idle');
  refreshTaskStateUi();
  renderConversationList();
  renderActiveConversation();
  renderTaskPanelsFromCache(conversation.lastTaskId || '');

    restoreActiveTask();

function startNewConversation() {

  const conversation = createConversation();
  setActiveConversation(conversation.id);
}

function ensureActiveResultEntry(taskId) {
  const entryId = `result-${taskId}`;
  if (activeResultTaskId === taskId && activeResultEntry && activeResultBubble && activeResultEntryId === entryId) {
    return activeResultBubble;
  }

  activeResultTaskId = taskId;
  activeResultEntryId = entryId;

  const entry = addOrUpdateConversationEntry({
    id: entryId,
    type: 'result',
    content: activeResultContent,
    render: 'markdown',
    taskId,
  });
  activeResultEntry = upsertRenderedConversationEntry(entry, { streaming: true });
  activeResultEntry.classList.add('streaming');
  activeResultBubble = activeResultEntry.querySelector('.ebubble');
  return activeResultBubble;
}

function appendResultDelta(content, taskId) {
  if (!content) return;
  if (activeResultTaskId !== taskId) {
    activeResultContent = '';
  }
  activeResultContent += content;
  const entry = addOrUpdateConversationEntry({
    id: `result-${taskId}`,
    type: 'result',
    content: activeResultContent,
    render: 'markdown',
    taskId,
  });
  const bubble = ensureActiveResultEntry(taskId);
  upsertRenderedConversationEntry(entry, { streaming: true });
  setBubbleContent(bubble, activeResultContent, { render: 'markdown' });
  scrollLogToBottom(false);
}

function finalizeResultContent(content, taskId) {
  if (activeResultTaskId !== taskId) {
    activeResultContent = '';
  }
  activeResultContent = String(content ?? activeResultContent);
  const entry = addOrUpdateConversationEntry({
    id: `result-${taskId}`,
    type: 'result',
    content: activeResultContent,
    render: 'markdown',
    taskId,
  });
  const bubble = ensureActiveResultEntry(taskId);
  upsertRenderedConversationEntry(entry, { streaming: false });
  setBubbleContent(bubble, activeResultContent, { render: 'markdown' });
  activeResultEntry.classList.remove('streaming');
  scrollLogToBottom(false);
}

function resetActivityPanel() {
  document.getElementById('activity-body').innerHTML = EMPTY_ACTIVITY_TEMPLATE;
}

function resetMonitoringPanel() {
  document.getElementById('monitor-body').innerHTML = EMPTY_MONITOR_TEMPLATE;
  document.getElementById('stat-dur').textContent = '-';
  document.getElementById('stat-llm').textContent = '-';
  document.getElementById('stat-tok').textContent = '-';
  const errEl = document.getElementById('stat-err');
  errEl.textContent = '-';
  errEl.className = 'stat-value';
}

function formatActivityTimestamp(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  if (Number.isNaN(date.getTime())) return '';
  return date.toLocaleTimeString('zh-CN', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
  });
}

function activityContentForEvent(event) {
  if (event.type === 'file') {
    return `已生成文件：${event.name || event.content || '下载文件'}`;
  }
  if (event.type === 'question') {
    return `需要你补充：${event.content || ''}`.trim();
  }
  if (event.type === 'user_reply') {
    return `已收到你的补充：${event.content || ''}`.trim();
  }
  return String(event.content || '').trim() || {
    start: '任务已开始',
    step: '处理中',
    error: '任务执行失败',
  }[event.type] || '收到新事件';
}

function appendActivityEvent(event) {
  const body = document.getElementById('activity-body');
  if (!body || !isActivityEventType(event.type)) return;

  const empty = body.querySelector('.monitor-empty');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = `activity-item activity-${event.type}`;
  item.innerHTML = `
    <div class="activity-icon">${icons[event.type] || '·'}</div>
    <div class="activity-text">
      <div>${esc(activityContentForEvent(event))}</div>
      <div class="activity-time">${esc(formatActivityTimestamp(event.created_at || nowIso()))}</div>
    </div>
  `;
  body.appendChild(item);
  body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });
}

function renderActivityFromCache(taskId) {
  resetActivityPanel();
  if (!taskId) return;
  const events = getCachedEvents(taskId).sort((a, b) => Number(a.seq) - Number(b.seq));
  for (const event of events) {
    if (!isActivityEventType(event.type)) continue;
    appendActivityEvent(event);
  }
}

function renderTaskPanelsFromCache(taskId) {
  renderActivityFromCache(taskId);
  resetMonitoringPanel();
  if (taskId) {
    renderLatestMonitoringFromCache(taskId);
  }
}

function renderMonitoring(data) {
  if (!data || !Array.isArray(data.events)) return;

  const body = document.getElementById('monitor-body');
  let html = '';
  for (const ev of data.events) {
    const layerCls = ev.layer || '';
    const eventCls = ev.event || '';
    const dur = ev.duration_ms != null ? `${ev.duration_ms.toFixed(0)}ms` : '';
    html += `<div class="timeline-item">
      <span class="tl-layer ${layerCls}">${esc(ev.layer || '-')}</span>
      <span class="tl-event ${eventCls}">${esc(ev.event || '-')}</span>
      <span class="tl-name">${esc(ev.name || '-')}</span>
      <span class="tl-dur">${esc(dur)}</span>
    </div>`;
    if (verboseOn && ev.metadata) {
      const parts = [];
      if (ev.metadata.output_preview) parts.push(`out: ${ev.metadata.output_preview}`);
      if (ev.metadata.tokens) parts.push(`tokens: ${ev.metadata.tokens}`);
      if (ev.metadata.model) parts.push(`model: ${ev.metadata.model}`);
      if (ev.metadata.error) parts.push(`error: ${ev.metadata.error}`);
      if (parts.length) {
        html += `<div class="tl-verbose">${esc(parts.join(' | '))}</div>`;
      }
    }
  }
  body.innerHTML = html || '<div class="monitor-empty">No events</div>';

  document.getElementById('stat-dur').textContent = data.total_duration_ms ? `${(data.total_duration_ms / 1000).toFixed(1)}s` : '-';
  document.getElementById('stat-llm').textContent = data.llm_call_count ?? '-';
  document.getElementById('stat-tok').textContent = data.total_tokens ? data.total_tokens.toLocaleString() : '-';
  const errEl = document.getElementById('stat-err');
  errEl.textContent = data.error_count ?? '0';
  errEl.className = `stat-value${data.error_count > 0 ? ' error-val' : ''}`;
}

function renderLatestMonitoringFromCache(taskId) {
  const monitoringEvent = [...getCachedEvents(taskId)].reverse().find(event => event.type === 'monitoring');
  if (monitoringEvent) renderMonitoring(monitoringEvent.content);
}

function eventEntryId(event) {
  return `evt-${event.task_id}-${event.seq}`;
}

function renderEvent(event, { fromCache = false } = {}) {
  if (event.type === 'monitoring') {
    renderMonitoring(event.content);
    return;
  }

  if (isActivityEventType(event.type)) {
    appendActivityEvent(event);
    if (event.type === 'start' || event.type === 'step') {
      return;
    }
  }

  if (event.type === 'result_delta') {
    appendResultDelta(event.content || '', event.task_id);
    return;
  }

  if (event.type === 'question') {
    const entry = addOrUpdateConversationEntry({
      id: eventEntryId(event),
      type: 'question',
      content: event.content || '',
      taskId: event.task_id,
      createdAt: event.created_at,
    });
    upsertRenderedConversationEntry(entry);
    setReplyMode(event.task_id, event);
    if (!fromCache) {
      setRunning(false);
      setDot('on');
    }
    return;
  }

  if (event.type === 'user_reply') {
    const entry = addOrUpdateConversationEntry({
      id: eventEntryId(event),
      type: 'user_reply',
      content: event.content || '',
      taskId: event.task_id,
      createdAt: event.created_at,
    });
    upsertRenderedConversationEntry(entry);
    clearReplyMode(event.task_id);
    if (!fromCache) {
      setRunning(true);
    }
    return;
  }

  if (event.type === 'file') {
    const entry = addOrUpdateConversationEntry({
      id: eventEntryId(event),
      type: 'file',
      content: event.content || '',
      taskId: event.task_id,
      name: event.name || '',
      url: event.url || '',
      createdAt: event.created_at,
    });
    upsertRenderedConversationEntry(entry);
    return;
  }

  if (event.type === 'result') {
    finalizeResultContent(event.content || '', event.task_id);
    if (!fromCache) {
      terminalEventSeen = true;
      setRunning(false);
    }
    return;
  }

  if (event.type === 'error') {
    if (activeResultEntry) {
      activeResultEntry.classList.remove('streaming');
    }
    const entry = addOrUpdateConversationEntry({
      id: eventEntryId(event),
      type: 'error',
      content: event.content || '',
      taskId: event.task_id,
      createdAt: event.created_at,
    });
    upsertRenderedConversationEntry(entry);
    if (!fromCache) {
      terminalEventSeen = true;
      setRunning(false);
    }
    return;
  }

  const entry = addOrUpdateConversationEntry({
    id: eventEntryId(event),
    type: event.type,
    content: event.content || '',
    taskId: event.task_id,
    createdAt: event.created_at,
  });
  upsertRenderedConversationEntry(entry);
}

function restoreCachedTask(taskId) {
  clearLog();
  resetActivityPanel();
  resetMonitoringPanel();
  const events = getCachedEvents(taskId).sort((a, b) => Number(a.seq) - Number(b.seq));
  for (const event of events) renderEvent(event, { fromCache: true });
  const maxSeq = events.reduce((acc, event) => Math.max(acc, Number(event.seq || 0)), 0);
  setLastSeq(taskId, maxSeq);
  terminalEventSeen = events.some(event => event.type === 'result' || event.type === 'error');
}

function persistAndRenderEvent(event) {
  if (!activeTaskId || event.task_id !== activeTaskId) return;

  const currentSeq = getLastSeq(activeTaskId);
  const eventSeq = Number(event.seq || 0);
  if (eventSeq && eventSeq <= currentSeq) {
    if (event.type === 'monitoring') renderMonitoring(event.content);
    return;
  }

  cacheEvent(activeTaskId, event);
  renderEvent(event);

  if (event.type === 'result' || event.type === 'error') {
    terminalEventSeen = true;
    setRunning(false);
  }

  if (event.type === 'monitoring' && terminalEventSeen) {
    closeEventSource();
    setDot('idle');
  }
}

async function fetchTask(taskId) {
  const res = await fetch(apiUrl(`/tasks/${encodeURIComponent(taskId)}`));
  if (res.status === 404) return null;
  const payload = await readResponsePayload(res);
  if (!res.ok) throw new Error(responseErrorMessage(res, payload, '获取任务状态失败'));
  return payload.data;
}

function openEventSource(taskId, afterSeq = 0) {
  closeEventSource();
  reconnectNoticeShown = false;
  const url = new URL(apiUrl(`/tasks/${encodeURIComponent(taskId)}/events`));
  if (afterSeq > 0) url.searchParams.set('after_seq', String(afterSeq));

  eventSource = new EventSource(url);
  setDot('off');

  eventSource.onopen = () => {
    setDot('on');
    reconnectNoticeShown = false;
  };

  const listener = event => {
    try {
      persistAndRenderEvent(JSON.parse(event.data));
    } catch {
      appendActivityEvent({
        type: 'error',
        content: '收到无法解析的事件数据。',
        created_at: nowIso(),
      });
    }
  };

  ['start', 'step', 'file', 'question', 'user_reply', 'result_delta', 'result', 'error', 'monitoring'].forEach(type => {
    eventSource.addEventListener(type, listener);
  });

  eventSource.onerror = async () => {
    if (!activeTaskId) {
      closeEventSource();
      setDot('idle');
      return;
    }

    if (running && !reconnectNoticeShown) {
      appendActivityEvent({
        type: 'step',
        content: '连接断开，正在重连；任务可能仍在继续。',
        created_at: nowIso(),
      });
      reconnectNoticeShown = true;
    }
    setDot(running ? 'off' : 'err');

    try {
      const snapshot = await fetchTask(activeTaskId);
      if (snapshot && !['queued', 'running', 'waiting_for_user'].includes(snapshot.status)) {
        closeEventSource();
        setRunning(false);
        setDot('idle');
      }
    } catch {
      // Keep EventSource reconnect behavior as-is.
    }
  };
}

async function uploadPendingFiles() {
  const filePaths = [];
  for (const file of pendingFiles) {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch(apiUrl('/upload'), { method: 'POST', body: form });
    const payload = await readResponsePayload(res);
    if (!res.ok) {
      throw new Error(responseErrorMessage(res, payload, `文件上传失败: ${file.name}`));
    }
    const data = payload.data;
    if (!data?.path) {
      throw new Error(`文件上传响应为空: ${file.name}`);
    }
    filePaths.push(data.path);
  }
  return filePaths;
}

function prepareNewTask(taskId) {
  closeEventSource();
  setActiveTask(taskId);
  const conversation = getConversation();
  if (conversation) {
    touchConversation(conversation, { lastTaskId: taskId });
    saveConversations();
    renderConversationList();
  }
  activeResultEntry = null;
  activeResultBubble = null;
  activeResultContent = '';
  activeResultEntryId = '';
  activeResultTaskId = taskId;
  clearReplyMode(taskId);
  resetActivityPanel();
  resetMonitoringPanel();
  reconnectNoticeShown = false;
  terminalEventSeen = false;
}

async function sendTask() {
  if (running) return;

  const inp = document.getElementById('task-input');
  const task = inp.value.trim();
  if (!task) return;

  if (isActiveTaskAwaitingReply() && pendingFiles.length > 0) {
    addLog('error', '回复当前任务暂不支持附件，请先移除附件后再发送。');
    shakeInput();
    return;
  }

  if (!isActiveTaskAwaitingReply() && taskMode === 'chat' && pendingFiles.length > 0) {
    addLog('error', '聊天模式暂不支持附件，请切换到自动或 Agent 模式。');
    shakeInput();
    return;
  }

  try {
    if (isActiveTaskAwaitingReply()) {
      const replyTaskId = awaitingReplyTaskId;
      setRunning(true);
      setDot('off');

      const res = await fetch(apiUrl(`/tasks/${encodeURIComponent(replyTaskId)}/reply`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer: task }),
      });

      const payload = await readResponsePayload(res);
      if (!res.ok) {
        throw new Error(responseErrorMessage(res, payload, '回复任务失败'));
      }

      inp.value = '';
      clearReplyMode(replyTaskId);
      clearFiles();
      return;
    }

    const userEntry = addOrUpdateConversationEntry({
      id: makeId('user'),
      type: 'user',
      content: task,
      createdAt: nowIso(),
    });
    upsertRenderedConversationEntry(userEntry);
    scrollLogToBottom(false, true);

    setRunning(true);
    setDot('off');

    const filePaths = await uploadPendingFiles();
    const res = await fetch(apiUrl('/tasks'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        task,
        user_id: getUserId(),
        mode: taskMode,
        thinking_level: thinkingLevel,
        file_paths: filePaths,
      }),
    });

    const payload = await readResponsePayload(res);
    const data = payload.data;
    if (!res.ok) {
      throw new Error(responseErrorMessage(res, payload, '任务提交失败'));
    }
    if (!data?.task_id) {
      throw new Error(`任务提交响应为空（${res.status}）`);
    }

    prepareNewTask(data.task_id);
    inp.value = '';
    clearFiles();
    openEventSource(data.task_id, 0);
  } catch (error) {
    const errorEntry = addOrUpdateConversationEntry({
      id: makeId('error'),
      type: 'error',
      content: error.message || '任务提交失败',
      createdAt: nowIso(),
    });
    upsertRenderedConversationEntry(errorEntry);
    scrollLogToBottom(false, true);
    setRunning(false);
    setDot('err');
    shakeInput();
  }
}
