<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chat dada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:   #FEF6ED;
    --warm0:   #FFF0E2;
    --warm1:   #FDDCC4;
    --peach:   #F6A97A;
    --rose:    #EE8B7B;
    --blush:   #F2BDB5;
    --honey:   #F0C080;
    --text:    #6B4033;
    --mid:     #A0705A;
    --dim:     #D4B4A4;
    --surface: #FFFAF5;
    --border:  #F0D8CA;
    --shadow:  rgba(200,120,80,0.10);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:var(--cream); color:var(--text); font-family:'Nunito',sans-serif; overflow-x:hidden; }

  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(246,169,122,.13) 0%,transparent 70%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(238,139,123,.10) 0%,transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(253,220,196,.18) 0%,transparent 80%);
  }
  body::after{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.45;
    background-image:radial-gradient(circle,rgba(246,169,122,.2) 1px,transparent 1px);
    background-size:28px 28px;
  }

  /* ── Header ── */
  header{
    position:relative; z-index:10;
    padding:28px 48px 0;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo{ display:flex; align-items:center; gap:10px; }
  .logo-icon{
    width:36px; height:36px; border-radius:12px;
    background:linear-gradient(135deg,var(--peach),var(--rose));
    display:grid; place-items:center;
    font-family:'Pacifico',cursive; font-size:15px; color:#fff;
    box-shadow:0 4px 14px rgba(238,139,123,.35);
  }
  .logo-name{ font-family:'Pacifico',cursive; font-size:22px; color:var(--rose); text-shadow:0 2px 8px rgba(238,139,123,.2); }
  .ws-badge{
    display:flex; align-items:center; gap:7px;
    background:var(--surface); border:1.5px solid var(--border); border-radius:20px;
    padding:6px 16px; font-size:12px; font-weight:600; color:var(--mid);
    box-shadow:0 2px 8px var(--shadow);
  }
  .ws-dot{ width:7px; height:7px; border-radius:50%; background:var(--dim); transition:all .4s; }
  .ws-dot.on { background:#7EC98F; box-shadow:0 0 0 3px rgba(126,201,143,.25); animation:dpulse 2s ease-in-out infinite; }
  .ws-dot.err{ background:#E88080; box-shadow:0 0 0 3px rgba(220,80,80,.2); }
  @keyframes dpulse{ 0%,100%{box-shadow:0 0 0 3px rgba(126,201,143,.25);} 50%{box-shadow:0 0 0 6px rgba(126,201,143,.08);} }

  /* ── Main ── */
  main{
    position:relative; z-index:5;
    max-width:780px; margin:0 auto;
    padding:44px 32px 200px;
    display:flex; flex-direction:column; gap:30px;
  }
  @keyframes fadeup{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%    { transform:translateX(-6px); }
    40%    { transform:translateX(6px); }
    60%    { transform:translateX(-4px); }
    80%    { transform:translateX(4px); }
  }

  /* ── 欢迎 ── */
  .welcome{ text-align:center; padding:12px 0 4px; animation:fadeup .7s ease both; }
  .welcome h1{ font-family:'Playfair Display',serif; font-style:italic; font-size:30px; color:var(--rose); margin-bottom:10px; }
  .welcome p{ font-size:14.5px; color:var(--mid); font-weight:500; }

  /* ── 日志 ── */
  .log-wrap{
    background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
    box-shadow:0 8px 32px var(--shadow); overflow:hidden;
    min-height:340px; display:flex; flex-direction:column;
    animation:fadeup .7s .08s ease both;
  }
  .log-top{
    padding:16px 26px 13px; border-bottom:1.5px solid var(--border);
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(to right,rgba(253,220,196,.3),transparent);
  }
  .dots{ display:flex; gap:6px; }
  .dots span{ width:9px; height:9px; border-radius:50%; }
  .dots span:nth-child(1){background:#FFBCB5;} .dots span:nth-child(2){background:#FFD6A5;} .dots span:nth-child(3){background:#C3E6CB;}
  .log-ttl{ font-size:12.5px; font-weight:700; color:var(--mid); letter-spacing:.05em; margin-left:4px; }
  .log-body{
    flex:1; padding:28px; overflow-y:auto;
    display:flex; flex-direction:column; gap:14px;
  }
  .log-body::-webkit-scrollbar{ width:4px; }
  .log-body::-webkit-scrollbar-thumb{ background:var(--warm1); border-radius:4px; }

  .empty{ margin:auto; display:flex; flex-direction:column; align-items:center; gap:16px; color:var(--dim); }
  .empty-fl{ display:flex; gap:18px; align-items:flex-end; height:60px; }
  .dancer{ color:var(--peach); flex-shrink:0; transform-origin:center bottom; }
  .dancer-1{ animation:d-bounce .9s ease-in-out infinite; }
  .dancer-2{ animation:d-sway 1.1s ease-in-out infinite .18s; }
  .dancer-3{ animation:d-bounce .85s ease-in-out infinite .35s; }
  @keyframes d-bounce{
    0%,100%{ transform:translateY(0) rotate(-6deg); }
    50%    { transform:translateY(-14px) rotate(6deg); }
  }
  @keyframes d-sway{
    0%,100%{ transform:translateY(2px) rotate(-12deg); }
    50%    { transform:translateY(-10px) rotate(12deg); }
  }
  .empty p{ font-size:13.5px; font-weight:600; }

  .entry{ display:flex; align-items:flex-start; gap:12px; animation:ein .3s ease both; }
  @keyframes ein{ from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .eicon{ width:30px; height:30px; border-radius:10px; display:grid; place-items:center; font-size:14px; flex-shrink:0; margin-top:2px; }
  .ebubble{ flex:1; padding:10px 16px; border-radius:14px; font-size:13.5px; font-weight:500; line-height:1.65; }

  .type-start .eicon  { background:rgba(240,192,128,.25); }
  .type-start .ebubble{ background:rgba(240,192,128,.15); color:#9B6D2A; border:1px solid rgba(240,192,128,.3); }
  .type-step  .eicon  { background:rgba(246,169,122,.2); }
  .type-step  .ebubble{ background:rgba(246,169,122,.1); color:var(--mid); border:1px solid rgba(246,169,122,.2); }
  .type-result .eicon  { background:rgba(195,230,203,.4); }
  .type-result .ebubble{ background:rgba(195,230,203,.2); color:#3D7A50; border:1px solid rgba(195,230,203,.5); font-weight:700; }
  .type-error  .eicon  { background:rgba(238,139,123,.2); }
  .type-error  .ebubble{ background:rgba(238,139,123,.1); color:var(--rose); border:1px solid rgba(238,139,123,.25); }

  /* ── 背景滚动卡片 ── */
  .bg-cards{
    position:fixed; z-index:1;
    top:-30%; left:-15%; right:-15%; bottom:-30%;
    transform:rotate(-15deg);
    display:flex; gap:32px; justify-content:center;
    opacity:.35; overflow:hidden;
  }
  .bg-cards:hover{ opacity:.6; }
  .bg-cards:hover .bg-col{ animation-play-state:paused; }

  .bg-col{
    display:flex; flex-direction:column; gap:24px;
    width:240px; flex-shrink:0;
  }
  .bg-col:nth-child(odd) { animation:bg-up   55s linear infinite; }
  .bg-col:nth-child(even){ animation:bg-down 60s linear infinite; }
  .bg-col:nth-child(1){ animation-duration:58s; }
  .bg-col:nth-child(2){ animation-duration:52s; }
  .bg-col:nth-child(3){ animation-duration:62s; }
  .bg-col:nth-child(4){ animation-duration:50s; }
  .bg-col:nth-child(5){ animation-duration:56s; }

  @keyframes bg-up  { 0%{transform:translateY(0)}    100%{transform:translateY(-50%)} }
  @keyframes bg-down{ 0%{transform:translateY(-50%)} 100%{transform:translateY(0)} }

  .bg-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:18px;
    padding:18px 20px; cursor:pointer; flex-shrink:0;
    transition:all .25s;
  }
  .bg-card:hover{
    background:var(--warm0); border-color:var(--peach);
    box-shadow:0 4px 16px rgba(246,169,122,.35);
    transform:scale(1.06);
  }
  .bg-cat{ display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--peach); margin-bottom:6px; }
  .bg-text{ font-size:14px; color:var(--mid); font-weight:500; line-height:1.55; }

  /* ── 输入 ── */
  .input-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
    padding:6px 6px 6px 24px; display:flex; align-items:flex-end; gap:12px;
    box-shadow:0 8px 32px var(--shadow); transition:border-color .25s,box-shadow .25s;
    animation:fadeup .7s .22s ease both;
  }
  .input-card:focus-within{
    border-color:var(--peach);
    box-shadow:0 8px 32px rgba(246,169,122,.2),0 0 0 3px rgba(246,169,122,.1);
  }
  #task-input{
    flex:1; background:transparent; border:none; outline:none;
    font-family:'Nunito',sans-serif; font-size:14.5px; font-weight:500; color:var(--text);
    resize:none; min-height:54px; max-height:140px; padding:16px 0; line-height:1.6;
  }
  #task-input::placeholder{ color:var(--dim); }
  .send-wrap{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; padding-bottom:4px; }
  #send-btn{
    width:48px; height:48px; border-radius:18px;
    background:linear-gradient(135deg,var(--peach),var(--rose));
    border:none; cursor:pointer; display:grid; place-items:center;
    font-size:20px; color:#fff;
    box-shadow:0 4px 14px rgba(238,139,123,.4); transition:all .2s;
  }
  #send-btn:hover:not(:disabled){ transform:translateY(-2px) scale(1.06); box-shadow:0 6px 20px rgba(238,139,123,.5); }
  #send-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .hint{ font-size:10.5px; color:var(--dim); font-weight:600; }

  /* ━━━ 底部 A ━━━ */
  .stage{
    position:fixed; bottom:0; left:0; right:0; height:108px;
    pointer-events:none; z-index:100; overflow:hidden;
  }
  .ground{
    position:absolute; bottom:36px; left:0; right:0; height:2px;
    background:linear-gradient(to right,transparent 0%,rgba(246,169,122,.3) 20%,rgba(246,169,122,.45) 50%,rgba(246,169,122,.3) 80%,transparent 100%);
  }

  /* A 本体 */
  #the-a{
    position:absolute;
    bottom:37px;
    left:50%;
    font-family:'Playfair Display',serif;
    font-size:46px; font-style:italic; font-weight:700;
    color:var(--peach);
    line-height:1;
    text-shadow:0 4px 16px rgba(246,169,122,.4);
    transform-origin:center bottom;
    will-change:transform;
    /* 待命：上下浮动 */
    animation:idle 3s ease-in-out infinite;
  }
  @keyframes idle{
    0%,100%{ transform:translateX(-50%) translateY(0) rotate(-3deg) scale(1); }
    50%     { transform:translateX(-50%) translateY(-7px) rotate(3deg) scale(1.04); }
  }

  /* 执行：原地慢滚 + 上下跳 */
  #the-a.rolling{
    color:var(--rose);
    text-shadow:0 4px 22px rgba(238,139,123,.55);
    animation:roll 3.2s ease-in-out infinite;
  }
  @keyframes roll{
    0%  { transform:translateX(-50%) translateY(0px)   rotate(0deg); }
    25% { transform:translateX(-50%) translateY(-12px) rotate(90deg); }
    50% { transform:translateX(-50%) translateY(0px)   rotate(180deg); }
    75% { transform:translateX(-50%) translateY(-12px) rotate(270deg); }
    100%{ transform:translateX(-50%) translateY(0px)   rotate(360deg); }
  }

  /* 滚动时地面阴影 */
  #the-a.rolling::after{
    content:'';
    position:absolute; bottom:-5px; left:50%;
    transform:translateX(-50%);
    width:28px; height:5px;
    background:radial-gradient(ellipse,rgba(238,139,123,.4) 0%,transparent 70%);
    border-radius:50%;
    animation:shd 3.2s ease-in-out infinite;
  }
  @keyframes shd{
    0%,50%,100%{ transform:translateX(-50%) scaleX(1);   opacity:.5; }
    25%,75%    { transform:translateX(-50%) scaleX(.4);  opacity:.15; }
  }

  .a-lbl{
    position:absolute; bottom:8px; left:50%;
    transform:translateX(-50%);
    font-size:10px; font-weight:700; color:var(--dim);
    letter-spacing:.14em; text-transform:uppercase; white-space:nowrap;
    transition:color .4s;
  }
  .a-lbl.active{
    color:var(--peach);
    animation:lblpulse 1.6s ease-in-out infinite;
  }
  @keyframes lblpulse{ 0%,100%{opacity:1} 50%{opacity:.45} }
</style>
</head>
<body>

<!-- 背景滚动卡片 -->
<div class="bg-cards" id="bg-cards"></div>

<header>
  <div class="logo">
    <div class="logo-icon">d</div>
    <div class="logo-name">chat dada</div>
  </div>
  <div class="ws-badge">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-txt">连接中</span>
  </div>
</header>

<main>
  <div class="welcome">
    <h1>今天想做什么呀？</h1>
    <p>告诉我任务，我来帮你搜索、整理、操作 ✦</p>
  </div>

  <div class="log-wrap">
    <div class="log-top">
      <div class="dots"><span></span><span></span><span></span></div>
      <span class="log-ttl">执行日志</span>
    </div>
    <div class="log-body" id="log-body">
      <div class="empty" id="empty">
        <div class="empty-fl">
          <!-- 举双手跳 -->
          <svg class="dancer dancer-1" width="34" height="56" viewBox="0 0 34 56" fill="none">
            <circle cx="17" cy="8" r="6.5" stroke="currentColor" stroke-width="2.4"/>
            <line x1="17" y1="15" x2="17" y2="36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="23" x2="5"  y2="11" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="23" x2="29" y2="11" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="36" x2="8"  y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="36" x2="26" y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
          <!-- 迪斯科 一手上一手下 -->
          <svg class="dancer dancer-2" width="34" height="56" viewBox="0 0 34 56" fill="none">
            <circle cx="17" cy="8" r="6.5" stroke="currentColor" stroke-width="2.4"/>
            <line x1="17" y1="15" x2="17" y2="36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="22" x2="4"  y2="12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="22" x2="30" y2="30" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="36" x2="7"  y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="36" x2="27" y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
          <!-- 张开双臂扭 -->
          <svg class="dancer dancer-3" width="34" height="56" viewBox="0 0 34 56" fill="none">
            <circle cx="17" cy="8" r="6.5" stroke="currentColor" stroke-width="2.4"/>
            <line x1="17" y1="15" x2="17" y2="36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="23" x2="2"  y2="23" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="23" x2="32" y2="23" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="36" x2="8"  y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="17" y1="36" x2="26" y2="52" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
        </div>
        <p>还没有任务哦，输入一个试试吧～</p>
      </div>
    </div>
  </div>

  <div class="input-card">
    <textarea id="task-input" placeholder="描述你的任务，比如：帮我搜索今天 AI 新闻，整理成要点保存到桌面…" rows="2"></textarea>
    <div class="send-wrap">
      <button id="send-btn" onclick="sendTask()" title="发送 (Ctrl+Enter)">
        <span id="btn-icon">✦</span>
      </button>
      <div class="hint">Ctrl ↵</div>
    </div>
  </div>
</main>

<!-- 底部 A 舞台 -->
<div class="stage">
  <div class="ground"></div>
  <div id="the-a">𝒜</div>
  <div class="a-lbl" id="a-lbl">待命中</div>
</div>

<script>
let ws = null, running = false, runTimer = null;

function connect() {
  const proto = location.protocol==='https:'?'wss':'ws';
  // 始终连到 FastAPI 服务端口 8000，避免被 Live Server 等工具的 WS 误接管
  const apiHost = location.hostname + ':8000';
  ws = new WebSocket(`${proto}://${apiHost}/ws`);
  ws.onopen  = () => { setDot('on'); };
  ws.onerror = () => { setDot('err'); };
  ws.onclose = () => {
    if (running) {
      setRunning(false);
      addLog('error', 'WebSocket 连接断开，任务中止。请确认服务端是否正在运行。');
    }
    setDot('off');
    setTimeout(connect, 3000);
  };
  ws.onmessage = e => handle(JSON.parse(e.data));
}

function setDot(state) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-txt');
  const states = { on: ['on', '已连接'], off: ['', '重连中…'], err: ['err', '未连接'] };
  const [cls, label] = states[state] || states.off;
  dot.className = 'ws-dot' + (cls ? ' '+cls : '');
  txt.textContent = label;
}

const icons = { start:'🌟', step:'✦', result:'🎉', error:'🌧️' };

function handle(msg) {
  const { type, content } = msg;
  if (type === 'start') clearLog();
  addLog(type, content);
  if (type === 'result' || type === 'error') setRunning(false);
}

function addLog(type, content) {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  const body = document.getElementById('log-body');
  const el = document.createElement('div');
  el.className = `entry type-${type}`;
  el.innerHTML = `<div class="eicon">${icons[type]||'·'}</div><div class="ebubble">${esc(content)}</div>`;
  body.appendChild(el);
  el.scrollIntoView({ behavior:'smooth', block:'end' });
}

function clearLog() {
  document.getElementById('log-body').innerHTML = '';
}

function sendTask() {
  if (running) return;
  if (!ws || ws.readyState !== 1) {
    shakeInput();
    return;
  }
  const inp = document.getElementById('task-input');
  const task = inp.value.trim();
  if (!task) return;
  setRunning(true);
  ws.send(JSON.stringify({ task }));
  inp.value = '';
}

function shakeInput() {
  const card = document.querySelector('.input-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'shake .4s ease';
  setTimeout(() => card.style.animation = '', 400);
}

function setRunning(r) {
  running = r;
  clearTimeout(runTimer);
  if (r) {
    runTimer = setTimeout(() => {
      if (!running) return;
      setRunning(false);
      addLog('error', '执行超时（90s），Agent 长时间无响应。请检查服务端日志或网络状态。');
    }, 90000);
  }
  document.getElementById('send-btn').disabled = r;
  document.getElementById('btn-icon').textContent = r ? '···' : '✦';
  const a = document.getElementById('the-a');
  const lbl = document.getElementById('a-lbl');
  if (r) {
    a.classList.add('rolling');
    lbl.textContent = '执行中～';
    lbl.classList.add('active');
  } else {
    a.classList.remove('rolling');
    lbl.textContent = '待命中';
    lbl.classList.remove('active');
  }
}

function fillSug(text) {
  document.getElementById('task-input').value = text;
  document.getElementById('task-input').focus();
}

// ── 建议数据（未来可替换为 fetch('/api/suggestions')） ──
const SUGGESTIONS = [
  { cat:'搜索', icon:'🔍', text:'搜索今天最新的 AI 行业动态，整理成要点列表' },
  { cat:'浏览器', icon:'🌐', text:'打开 GitHub 搜索 browser-use，获取 star 数和主要功能介绍' },
  { cat:'文件', icon:'📝', text:'读取桌面的 notes.txt，整理成结构化的 Markdown 格式' },
  { cat:'文件', icon:'💾', text:'把搜索结果整理成报告，保存到桌面 report.md' },

async function loadSuggestions() {
  // 未来替换为：const res = await fetch('/api/suggestions'); return res.json();
  return SUGGESTIONS;
}

async function renderBgCards() {
  const data = await loadSuggestions();
  const colCount = 5;
  const cols = Array.from({length:colCount}, () => []);
  data.forEach((s, i) => cols[i % colCount].push(s));
  document.getElementById('bg-cards').innerHTML = cols.map(col => {
    const html = col.map(s => `
      <div class="bg-card" onclick="fillSug(this.dataset.text)" data-text="${s.text.replace(/"/g,'&quot;')}">
        <div class="bg-cat"><span>${s.icon}</span>${s.cat}</div>
        <div class="bg-text">${esc(s.text)}</div>
      </div>`).join('');
    const half = html.repeat(5);
    return `<div class="bg-col">${half}${half}</div>`;
  }).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendTask(); }
});

connect();
renderBgCards();
